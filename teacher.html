<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Forum — Teacher (Live)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFF1EA; --card:#FFFFFF; --ink:#20261F; --ink-soft:#5B6358;
    --stamp-red:#B23A2E; --postal-blue:#3D5A73; --gold:#C9A227; --border:#D7DACE;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;-webkit-font-smoothing:antialiased;}
  .app{width:100%;max-width:1500px;margin:0 auto;padding:0 16px 60px;}
  @media (min-width:1100px){ .app{width:92%;} }

  header.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 4px 14px;border-bottom:1px solid var(--border);margin-bottom:18px;gap:12px;flex-wrap:wrap;}
  .brand{font-family:'Fraunces',serif;font-weight:600;font-size:1.3rem;}
  .brand small{display:block;font-family:'IBM Plex Mono',monospace;font-size:0.6rem;color:var(--ink-soft);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;}
  .who-row{display:flex;align-items:center;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:0.78rem;color:var(--ink-soft);}
  .class-pill{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;background:#EEF1EC;color:var(--postal-blue);padding:4px 10px;border-radius:12px;}
  .switch-class-btn{font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:0.82rem;color:#fff;background:var(--stamp-red);border:none;border-radius:9px;padding:8px 14px;cursor:pointer;}
  .switch-class-btn:hover{opacity:0.92;}

  .nav{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap;}
  .nav button{font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:0.86rem;padding:9px 16px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--ink-soft);cursor:pointer;}
  .nav button.active{background:var(--ink);color:#fff;border-color:var(--ink);}

  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;}
  .section-label{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.07em;margin:18px 4px 8px;}

  input[type=text], input[type=number], input[type=password], input[type=datetime-local], textarea, select{
    width:100%;font-family:'IBM Plex Sans',sans-serif;font-size:0.92rem;padding:9px 11px;
    border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--ink);
  }
  textarea{resize:vertical;}
  label.field-label{display:block;font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:5px;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:9px;padding:10px 16px;font-weight:600;font-size:0.88rem;cursor:pointer;}
  .btn-primary{background:var(--stamp-red);color:#fff;}
  .btn-primary:hover{opacity:0.92;}
  .btn-ghost{background:transparent;color:var(--postal-blue);border:1px solid var(--border);}
  .btn-block{width:100%;}
  .btn-sm{padding:6px 11px;font-size:0.78rem;}

  /* Login */
  .login-screen{min-height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:18px;}
  .login-screen .brand{font-size:2rem;}
  .login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;width:100%;max-width:340px;}
  .error-msg{color:var(--stamp-red);font-size:0.82rem;margin-top:8px;display:none;}

  /* Class select */
  .class-select-screen{min-height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:8px;padding:20px;}
  .class-select-screen h2{font-family:'Fraunces',serif;font-weight:600;font-size:1.7rem;margin:0;}
  .class-select-screen p{color:var(--ink-soft);font-size:0.92rem;margin:0 0 20px;}
  .class-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;max-width:520px;}
  .class-card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    width:160px;height:110px;display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;font-weight:600;font-size:1.2rem;color:var(--postal-blue);
    cursor:pointer;transition:transform .1s ease, box-shadow .15s ease;
  }
  .class-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(32,38,31,0.1);}

  /* Grading layout */
  .grading-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .grading-toolbar select{max-width:260px;}
  .grading-layout{display:grid;grid-template-columns:1fr;gap:18px;align-items:start;}
  @media (min-width:760px){
    .grading-layout{grid-template-columns:1.2fr 1fr;}
    .grading-layout > div{height:calc(100vh - 200px);min-height:480px;overflow-y:auto;}
  }

  .submission-card{}
  .sub-title{font-family:'Fraunces',serif;font-weight:600;font-size:1.25rem;margin-bottom:8px;}
  .sub-meta{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--postal-blue);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:600;font-size:0.92rem;flex-shrink:0;}
  .sub-meta .nm{font-weight:600;font-size:0.92rem;}
  .sub-meta .wc{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:var(--ink-soft);}
  .sub-body{line-height:1.65;font-size:0.96rem;white-space:pre-wrap;margin-bottom:10px;}
  .sub-media img{width:100%;border-radius:10px;margin-bottom:10px;}
  .sub-subhead{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.06em;margin:18px 0 8px;border-top:1px solid var(--border);padding-top:14px;}
  .sub-comment{display:flex;gap:9px;margin-bottom:10px;}
  .sub-comment .avatar{width:26px;height:26px;font-size:0.7rem;}
  .sub-comment-body{flex:1;background:#F7F8F4;border-radius:9px;padding:8px 11px;}
  .sub-comment-body .cn{font-weight:600;font-size:0.8rem;}
  .sub-comment-body .ct{font-size:0.84rem;margin-top:1px;line-height:1.45;}
  .sub-comment-body .cwc{font-family:'IBM Plex Mono',monospace;font-size:0.66rem;color:var(--ink-soft);margin-top:4px;}
  .empty-note{color:var(--ink-soft);font-size:0.84rem;font-style:italic;}

  .grade-sidebar{position:relative;}
  .progress-bar{display:flex;align-items:center;justify-content:space-between;background:#F7F8F4;border-radius:10px;padding:10px 14px;margin-bottom:14px;}
  .progress-bar .ptext{font-family:'IBM Plex Mono',monospace;font-size:0.78rem;color:var(--ink-soft);}
  .progress-bar .ptotal{font-weight:600;color:var(--ink);}
  .student-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .student-nav .id{display:flex;align-items:center;gap:10px;}
  .student-nav .id .nm{font-weight:600;font-size:1.02rem;}
  .nav-arrow{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:1rem;color:var(--ink-soft);}
  .nav-arrow:hover{background:#F7F8F4;}

  .feedback-box label.field-label{margin-top:0;}
  .feedback-box textarea{min-height:80px;margin-bottom:16px;}

  .criterion{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
  .criterion-head{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;cursor:pointer;background:#FAFBF8;}
  .criterion-head .cname{font-weight:600;font-size:0.9rem;}
  .criterion-head .cpts{font-family:'IBM Plex Mono',monospace;font-size:0.74rem;color:var(--ink-soft);}
  .criterion-head .ctoggle{font-size:0.85rem;color:var(--ink-soft);}
  .criterion-body{padding:6px 14px 12px;display:none;}
  .criterion.open .criterion-body{display:block;}
  .criterion.open .criterion-head{background:#fff;border-bottom:1px solid var(--border);}
  .tier-option{display:flex;gap:10px;align-items:flex-start;padding:8px 6px;border-radius:8px;cursor:pointer;}
  .tier-option:hover{background:#F7F8F4;}
  .tier-option input{margin-top:3px;}
  .tier-option .tlabel{font-weight:600;font-size:0.85rem;}
  .tier-option .tdesc{font-size:0.78rem;color:var(--ink-soft);margin-top:2px;line-height:1.4;}
  .tier-option .tpts{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:var(--gold);margin-top:3px;display:inline-block;}
  .tier-option.auto-suggested{background:#FBF6E2;}
  .auto-tag{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;color:var(--gold);text-transform:uppercase;letter-spacing:0.04em;margin-left:6px;}

  .grade-actions{display:flex;gap:10px;margin-top:16px;}

  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 4px;border-bottom:1px solid var(--border);}
  .toggle-row:last-child{border-bottom:none;}
  .toggle-row .tname{font-weight:600;font-size:0.92rem;}
  .toggle-row .tdesc{font-size:0.8rem;color:var(--ink-soft);margin-top:2px;}
  .switch{position:relative;width:46px;height:26px;flex-shrink:0;}
  .switch input{opacity:0;width:0;height:0;}
  .switch .slider{position:absolute;inset:0;background:var(--border);border-radius:26px;cursor:pointer;transition:background .15s;}
  .switch .slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .15s;}
  .switch input:checked + .slider{background:var(--postal-blue);}
  .switch input:checked + .slider::before{transform:translateX(20px);}

  table.roster-table{width:100%;border-collapse:collapse;font-size:0.88rem;}
  table.roster-table th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.05em;padding:8px 10px;border-bottom:1px solid var(--border);}
  table.roster-table td{padding:10px;border-bottom:1px solid var(--border);}
  table.roster-table tr:last-child td{border-bottom:none;}

  .group-pill{display:inline-block;background:#EEF1EC;color:var(--postal-blue);font-family:'IBM Plex Mono',monospace;font-size:0.72rem;padding:3px 9px;border-radius:12px;margin:2px;}

  .week-edit-grid{display:grid;grid-template-columns:1fr;gap:12px;}
  @media (min-width:700px){ .week-edit-grid{grid-template-columns:1fr 1fr;} }

  /* Rubric editor */
  .version-pill{display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:0.78rem;padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:#fff;cursor:pointer;margin:0 8px 8px 0;}
  .version-pill.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .version-pill .vrange{opacity:0.7;}
  .editor-criterion{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;background:#FAFBF8;}
  .editor-criterion-head{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:10px;}
  .editor-tier-row{display:grid;grid-template-columns:1.2fr 2fr 0.7fr auto;gap:8px;align-items:end;margin-bottom:8px;}
  @media (max-width:700px){ .editor-criterion-head, .editor-tier-row{grid-template-columns:1fr;} }
  .icon-btn{background:none;border:1px solid var(--border);border-radius:8px;width:34px;height:34px;cursor:pointer;color:var(--stamp-red);flex-shrink:0;}
  .icon-btn:hover{background:#FBEAE7;}
  .icon-btn:disabled{opacity:0.3;cursor:not-allowed;}
  .icon-btn:disabled:hover{background:none;}
  .editor-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
  .new-version-row{display:flex;gap:10px;align-items:end;margin-top:18px;border-top:1px solid var(--border);padding-top:16px;}
  .new-version-row > div{flex:1;}
  .total-pts-note{font-family:'IBM Plex Mono',monospace;font-size:0.76rem;color:var(--ink-soft);margin-top:10px;}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(32,38,31,0.55);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:60px 20px;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:var(--card);border-radius:16px;padding:20px;max-width:420px;width:100%;box-shadow:0 14px 44px rgba(32,38,31,0.3);max-height:80vh;display:flex;flex-direction:column;}
  .student-search-list{margin:14px 0;overflow-y:auto;flex:1;min-height:60px;}
  .search-result-row{display:flex;align-items:center;gap:12px;padding:10px 8px;border-radius:9px;cursor:pointer;}
  .search-result-row:hover{background:#F7F8F4;}
  .search-result-row .nm{font-weight:600;font-size:0.92rem;}
  .search-result-row .st{font-size:0.78rem;color:var(--ink-soft);margin-top:1px;}
  .search-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:0.95rem;}
  .search-btn:hover{background:#F7F8F4;}

  .hidden{display:none !important;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;font-size:0.85rem;opacity:0;pointer-events:none;transition:all .25s ease;max-width:90%;text-align:center;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .mock-banner{font-family:'IBM Plex Mono',monospace;font-size:0.76rem;color:var(--gold);background:#FBF6E2;border:1px solid rgba(201,162,39,0.35);border-radius:10px;padding:10px 14px;margin-bottom:16px;}
  .version-tag{font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--ink-soft);opacity:0.7;margin-top:6px;}
  .loading-overlay{position:fixed;inset:0;background:rgba(239,241,234,0.88);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:200;}
  .loading-overlay.show{display:flex;}
  .spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--stamp-red);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-overlay .ltext{font-family:'IBM Plex Mono',monospace;font-size:0.85rem;color:var(--ink-soft);}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="ltext" id="loadingText">Loading…</div>
</div>

<div class="modal-overlay" id="studentSearchModal">
  <div class="modal-box">
    <input type="text" id="studentSearchInput" placeholder="Search students..." oninput="filterStudentSearch()">
    <div id="studentSearchList" class="student-search-list"></div>
    <button class="btn btn-ghost btn-block" onclick="closeStudentSearch()">Close</button>
  </div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal-box" style="text-align:center;">
    <div class="modal-icon" style="font-size:2.2rem;margin-bottom:6px;">⚠️</div>
    <p id="confirmModalText" style="font-size:0.92rem;color:var(--ink-soft);line-height:1.5;margin:0 0 18px;"></p>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeConfirmModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1;" id="confirmModalOkBtn">Remove</button>
    </div>
  </div>
</div>

<div class="app">

  <div class="login-screen" id="loginScreen">
    <div class="brand">Weekly Forum<small>TEACHER CONSOLE</small></div>
    <div class="login-card">
      <label class="field-label">Username</label>
      <input type="text" id="userInput" placeholder="your real username" autocomplete="off">
      <label class="field-label" style="margin-top:12px;">Password</label>
      <input type="password" id="pwInput" placeholder="••••••••">
      <button class="btn btn-primary btn-block" style="margin-top:14px;" onclick="login()">Enter</button>
      <div class="error-msg" id="loginError">Incorrect username or password.</div>
    </div>
    <div class="version-tag">live-v0.1 — 2026-06-25</div>
  </div>

  <div class="class-select-screen hidden" id="classSelectScreen">
    <h2>Select a class</h2>
    <p>Which class would you like to manage?</p>
    <div class="class-grid" id="classGrid"></div>
  </div>

  <div id="mainApp" class="hidden">
    <header class="topbar">
      <div class="brand">Weekly Forum<small>TEACHER CONSOLE</small></div>
      <div class="who-row">
        <span id="whoName">—</span>
        <span class="class-pill" id="classPill">—</span>
        <button class="switch-class-btn" onclick="showClassSelect()">🏫 Switch Class</button>
      </div>
    </header>

    <div class="nav">
      <button class="nav-btn active" data-tab="grading" onclick="switchTab('grading')">Grading</button>
      <button class="nav-btn" data-tab="schedule" onclick="switchTab('schedule')">Schedule &amp; Deadlines</button>
      <button class="nav-btn" data-tab="roster" onclick="switchTab('roster')">Roster &amp; Groups</button>
      <button class="nav-btn" data-tab="rubric" onclick="switchTab('rubric')">Rubric</button>
      <button class="nav-btn" data-tab="settings" onclick="switchTab('settings')">Settings</button>
    </div>

    <div id="content"></div>
  </div>
</div>

<script>
/* ====================================================================
   LIVE TEACHER BACKEND WIRING
   Replaces the mock CLASSES object with real calls to your Apps Script API.
   ==================================================================== */

const API_URL = "https://script.google.com/macros/s/AKfycbyMbuD6_z3PTOt8P_dS8TPTImZB-r1cnraENT82KGxD6eL2EGK0IxSC5spUu38SfFnX/exec";

async function callApi(action, payload){
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(Object.assign({ action }, payload || {})),
  });
  return res.json();
}

let currentTeacher = null;
let currentClass = null;
let classData = null;     // result of getClassData — roster/settings/schedule/groups/rubricVersions
let realClassNames = [];
let toastTimer;

function initials(name){ return (name||'?').split(' ').map(n=>n[0]).join(''); }
function wordCount(text){ return (text||'').trim().split(/\s+/).filter(Boolean).length; }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 2400);
}
function showLoading(text){
  document.getElementById('loadingText').textContent = text || 'Loading…';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading(){
  document.getElementById('loadingOverlay').classList.remove('show');
}

/* ====================== AUTH ====================== */
async function login(){
  const user = document.getElementById('userInput').value.trim();
  const pw = document.getElementById('pwInput').value;
  document.getElementById('loginError').style.display = 'none';
  showLoading('Logging in…');
  const result = await callApi('teacherLogin', { username: user, password: pw });
  hideLoading();
  if(result.success){
    currentTeacher = { displayName: result.displayName };
    document.getElementById('loginScreen').classList.add('hidden');
    await showClassSelect();
  } else {
    document.getElementById('loginError').textContent = result.error || 'Incorrect username or password.';
    document.getElementById('loginError').style.display = 'block';
  }
}

async function showClassSelect(){
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('classSelectScreen').classList.remove('hidden');
  document.getElementById('classGrid').innerHTML = `<div class="empty-note">Loading classes…</div>`;
  const result = await callApi('getClassesList');
  if(!result.success){
    document.getElementById('classGrid').innerHTML = `<div class="empty-note">${result.error}</div>`;
    return;
  }
  realClassNames = result.classes;
  document.getElementById('classGrid').innerHTML = realClassNames.map(name=>
    `<div class="class-card" onclick="enterClass('${name}')">${name}</div>`).join('');
}

async function enterClass(name){
  currentClass = name;
  showLoading('Loading class data…');
  classData = await callApi('getClassData', { classId: name });
  hideLoading();
  if(!classData.success){
    showToast(classData.error || "Couldn't load that class.");
    return;
  }
  document.getElementById('classSelectScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('whoName').textContent = currentTeacher.displayName;
  document.getElementById('classPill').textContent = name;
  gradingWeek = null;
  gradingIdx = 0;
  switchTab('grading');
}

function cls(){ return classData; }

/* ====================== NAV ====================== */
function switchTab(tab){
  document.querySelectorAll('.nav-btn').forEach(b=> b.classList.toggle('active', b.dataset.tab===tab));
  if(tab==='grading') renderGrading();
  if(tab==='schedule') renderSchedule();
  if(tab==='roster') renderRoster();
  if(tab==='rubric') renderRubricTab();
  if(tab==='settings') renderSettings();
}

/* ====================== RUBRIC VERSION LOOKUP ====================== */
function getRubricVersionForWeek(week){
  const versions = classData.rubricVersions;
  if(!versions.length) return { versionId:null, startWeek:0, criteria:[] };
  let best = versions[0];
  versions.forEach(v=>{ if(v.startWeek<=Number(week) && v.startWeek>=best.startWeek) best=v; });
  return best;
}

function getGroupmateCount(studentNumber, week){
  const rows = classData.groups.filter(g=>String(g.Week)===String(week));
  const mine = rows.find(g=>String(g.StudentNumber)===String(studentNumber));
  if(!mine) return 0;
  return rows.filter(g=>g.GroupID===mine.GroupID).length - 1;
}

function commentsQualify(commentsArr, deadline){
  if(!deadline) return commentsArr.every(c=>wordCount(c.text)>=30);
  return commentsArr.every(c=> wordCount(c.text)>=30 && new Date(c.createdAt) <= new Date(deadline));
}

function autoSelectTier(crit, sub, sn, week, schedule){
  if(crit.autoType==='WordCount'){
    const wc = wordCount(sub.text);
    if(wc===0) return 0;
    if(wc<40) return 1;
    if(wc<80) return 2;
    return 3;
  }
  if(crit.autoType==='PictureTimeliness') return sub.image ? 1 : 0;
  if(crit.autoType==='CommentCompletion'){
    const required = getGroupmateCount(sn, week);
    if(required<=0) return null;
    const ok = sub.commentsMade.length>=required && commentsQualify(sub.commentsMade, schedule && schedule.CommentDeadline);
    return ok ? 1 : 0;
  }
  if(crit.autoType==='ReplyCompletion'){
    const received = sub.commentsReceived;
    if(received.length===0) return null;
    const allReplied = received.every(c=>c.reply);
    if(!allReplied) return 0;
    const ok = received.every(c=> wordCount(c.reply.text)>=30 && (!schedule || !schedule.ReplyDeadline || new Date(c.reply.createdAt) <= new Date(schedule.ReplyDeadline)));
    return ok ? 1 : 0;
  }
  return null;
}

/* ====================== GRADING ====================== */
let gradingWeek = null;
let gradingIdx = 0;
let gradingSubmissionsCache = {}; // week -> {roster, submissions}
let gradingSelections = {};       // studentNumber -> {criterionId: tierIndex}
let gradingAutoSelections = {};   // studentNumber -> {criterionId: tierIndex} (for WasOverridden tracking)
let gradingFeedbackDraft = {};    // studentNumber -> text (local draft before save)
let gradingSavedSet = {};         // studentNumber -> true once saved this session

async function loadSubmissionsForWeek(week){
  if(gradingSubmissionsCache[week]) return gradingSubmissionsCache[week];
  const result = await callApi('getSubmissionsForGrading', { classId: currentClass, week });
  if(result.success) gradingSubmissionsCache[week] = result;
  return result;
}

function getSelections(sn, rubric, sub, week, schedule){
  if(!gradingSelections[sn]){
    const sel = {};
    rubric.forEach(crit=>{
      const auto = autoSelectTier(crit, sub, sn, week, schedule);
      if(auto!==null) sel[crit.id] = auto;
    });
    gradingSelections[sn] = sel;
    gradingAutoSelections[sn] = Object.assign({}, sel);
  }
  return gradingSelections[sn];
}

async function renderGrading(){
  const weekOptions = classData.schedule.sort((a,b)=>b.Week-a.Week)
    .map(s=>`<option value="${s.Week}">Week ${String(s.Week).padStart(2,'0')}</option>`).join('');
  if(gradingWeek===null && classData.schedule.length) gradingWeek = classData.schedule[0].Week;
  if(!classData.schedule.length){
    document.getElementById('content').innerHTML = `<div class="card empty-note">No weeks set up in Schedule yet — add one in the Schedule tab first.</div>`;
    return;
  }

  document.getElementById('content').innerHTML = `<div class="card empty-note">Loading submissions…</div>`;
  const subResult = await loadSubmissionsForWeek(gradingWeek);
  if(!subResult.success){
    document.getElementById('content').innerHTML = `<div class="card empty-note">${subResult.error}</div>`;
    return;
  }

  const studentNumbers = subResult.roster.map(r=>r.studentNumber);
  if(studentNumbers.length===0){
    document.getElementById('content').innerHTML = `<div class="card empty-note">No active students in this class yet.</div>`;
    return;
  }
  gradingIdx = ((gradingIdx % studentNumbers.length) + studentNumbers.length) % studentNumbers.length;
  const sn = studentNumbers[gradingIdx];
  const author = subResult.roster.find(r=>r.studentNumber===sn);
  const sub = subResult.submissions[sn];
  const schedule = classData.schedule.find(s=>String(s.Week)===String(gradingWeek));
  const rubricVersion = getRubricVersionForWeek(gradingWeek);
  const rubric = rubricVersion.criteria;
  const sel = getSelections(sn, rubric, sub, gradingWeek, schedule);
  const gradedCount = studentNumbers.filter(s=>gradingSavedSet[s]).length;

  let bodyHtml;
  if(!sub.title){
    bodyHtml = `<div class="card"><div class="empty-note">No submission from this student for this week.</div></div>`;
  } else {
    const wc = wordCount(sub.text);
    const mediaHtml = sub.image ? `<div class="sub-media"><img src="${sub.image}"></div>` : '';
    const receivedHtml = sub.commentsReceived.length
      ? sub.commentsReceived.map(c=>{
          const cAuthor = subResult.roster.find(r=>r.studentNumber===String(c.from));
          const cwc = wordCount(c.text);
          return `
            <div class="sub-comment">
              <div class="avatar" style="background:var(--postal-blue)">${initials(cAuthor?cAuthor.name:c.from)}</div>
              <div class="sub-comment-body">
                <div class="cn">${cAuthor?cAuthor.name:c.from}</div>
                <div class="ct">${c.text}</div>
                <div class="cwc">${cwc} words ${c.reply ? '· replied' : '· no reply yet'}</div>
              </div>
            </div>`;
        }).join('')
      : `<div class="empty-note">No comments received.</div>`;
    const madeHtml = sub.commentsMade.length
      ? sub.commentsMade.map(c=>{
          const cwc = wordCount(c.text);
          return `
            <div class="sub-comment">
              <div class="avatar" style="background:var(--border);color:var(--ink-soft);">→</div>
              <div class="sub-comment-body">
                <div class="cn">On: "${c.toPost}"</div>
                <div class="ct">${c.text}</div>
                <div class="cwc">${cwc} words</div>
              </div>
            </div>`;
        }).join('')
      : `<div class="empty-note">No comments made on groupmates.</div>`;

    bodyHtml = `
      <div class="card submission-card">
        <div class="sub-title">${sub.title}</div>
        <div class="sub-meta">
          <div class="avatar" style="background:var(--postal-blue)">${initials(author.name)}</div>
          <div><div class="nm">${author.name}</div><div class="wc">${wc} words</div></div>
        </div>
        <div class="sub-body">${sub.text}</div>
        ${mediaHtml}
        <div class="sub-subhead">Comments received (on their post)</div>
        ${receivedHtml}
        <div class="sub-subhead">Comments made (on groupmates' posts)</div>
        ${madeHtml}
      </div>`;
  }

  const criteriaHtml = rubric.map(crit=>{
    const selIdx = sel[crit.id];
    const tiersHtml = crit.tiers.map((t,i)=>{
      const checked = i===selIdx ? 'checked' : '';
      const autoTag = (i===selIdx && crit.autoType!=='Manual') ? '<span class="auto-tag">Auto-suggested</span>' : '';
      return `
        <label class="tier-option ${i===selIdx && crit.autoType!=='Manual' ? 'auto-suggested' : ''}">
          <input type="radio" name="${crit.id}-${sn}" value="${i}" ${checked} onchange="selectTier('${sn}','${crit.id}',${i})">
          <div>
            <div class="tlabel">${t.label}${autoTag}</div>
            ${t.desc ? `<div class="tdesc">${t.desc}</div>` : ''}
            <div class="tpts">${t.points} pts</div>
          </div>
        </label>`;
    }).join('');
    return `
      <div class="criterion open" id="crit-${crit.id}">
        <div class="criterion-head" onclick="toggleCriterion('${crit.id}')">
          <div><div class="cname">${crit.num||''} ${crit.name}</div></div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="cpts">${crit.maxPoints} pts max</span>
            <span class="ctoggle">▾</span>
          </div>
        </div>
        <div class="criterion-body">${tiersHtml}</div>
      </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="grading-toolbar">
      <select onchange="gradingWeek=parseInt(this.value); gradingIdx=0; gradingSelections={}; renderGrading();">${weekOptions}</select>
      <div class="progress-bar" style="flex:1;max-width:240px;">
        <span class="ptext">Graded</span>
        <span class="ptext ptotal">${gradedCount} / ${studentNumbers.length}</span>
      </div>
      <button class="search-btn" onclick="openStudentSearch()" title="Search students">🔍</button>
    </div>
    <div class="total-pts-note" style="margin:-8px 0 14px;">Using rubric version starting Week ${rubricVersion.startWeek} (Rubric tab to manage versions)</div>
    <div class="grading-layout">
      <div>${bodyHtml}</div>
      <div class="grade-sidebar card">
        <div class="student-nav">
          <button class="nav-arrow" onclick="navStudent(-1)">‹</button>
          <div class="id">
            <div class="avatar" style="background:var(--postal-blue)">${initials(author.name)}</div>
            <div class="nm">${author.name}</div>
          </div>
          <button class="nav-arrow" onclick="navStudent(1)">›</button>
        </div>
        <div class="feedback-box">
          <label class="field-label">Overall feedback (shown to student)</label>
          <textarea id="feedbackInput" placeholder="Write some overall advice...">${gradingFeedbackDraft[sn] || ''}</textarea>
        </div>
        ${criteriaHtml}
        <div class="grade-actions">
          <button class="btn btn-ghost" style="flex:1;" onclick="saveGrade(false)">Save</button>
          <button class="btn btn-primary" style="flex:1;" onclick="saveGrade(true)">Save &amp; Next →</button>
        </div>
      </div>
    </div>
  `;
}

function toggleCriterion(critId){ document.getElementById('crit-'+critId).classList.toggle('open'); }
function selectTier(sn, critId, idx){
  if(!gradingSelections[sn]) gradingSelections[sn] = {};
  gradingSelections[sn][critId] = idx;
}
function navStudent(dir){
  gradingIdx += dir;
  renderGrading();
}

async function saveGrade(andNext){
  const subResult = gradingSubmissionsCache[gradingWeek];
  const studentNumbers = subResult.roster.map(r=>r.studentNumber);
  const sn = studentNumbers[((gradingIdx % studentNumbers.length)+studentNumbers.length)%studentNumbers.length];
  gradingFeedbackDraft[sn] = document.getElementById('feedbackInput').value;

  const rubricVersion = getRubricVersionForWeek(gradingWeek);
  const sel = gradingSelections[sn] || {};
  const auto = gradingAutoSelections[sn] || {};
  const grades = rubricVersion.criteria
    .filter(crit => sel[crit.id] !== undefined)
    .map(crit => ({
      criterionId: crit.id,
      tierOrder: sel[crit.id],
      wasOverridden: auto[crit.id] !== undefined && auto[crit.id] !== sel[crit.id],
    }));

  showLoading('Saving grade…');
  const result = await callApi('saveGrade', {
    classId: currentClass, studentNumber: sn, week: gradingWeek,
    grades, overallFeedback: gradingFeedbackDraft[sn], gradedBy: currentTeacher.displayName,
  });
  hideLoading();

  if(result.success){
    gradingSavedSet[sn] = true;
    showToast(`Saved grade for ${author_name_lookup(sn)}.`);
    if(andNext) navStudent(1); else renderGrading();
  } else {
    showToast(result.error || "Couldn't save grade.");
  }
}
function author_name_lookup(sn){
  const r = gradingSubmissionsCache[gradingWeek].roster.find(r=>r.studentNumber===sn);
  return r ? r.name : sn;
}

/* ====================== STUDENT SEARCH MODAL ====================== */
function openStudentSearch(){
  document.getElementById('studentSearchModal').classList.add('show');
  const input = document.getElementById('studentSearchInput');
  input.value = '';
  renderStudentSearchList('');
  input.focus();
}
function closeStudentSearch(){ document.getElementById('studentSearchModal').classList.remove('show'); }
function filterStudentSearch(){ renderStudentSearchList(document.getElementById('studentSearchInput').value.toLowerCase()); }
function renderStudentSearchList(query){
  const subResult = gradingSubmissionsCache[gradingWeek];
  if(!subResult) return;
  const filtered = subResult.roster.filter(r=>
    r.name.toLowerCase().includes(query) || r.studentNumber.includes(query));
  document.getElementById('studentSearchList').innerHTML = filtered.map(r=>{
    const graded = !!gradingSavedSet[r.studentNumber];
    return `
      <div class="search-result-row" onclick="jumpToStudent('${r.studentNumber}')">
        <div class="avatar" style="background:var(--postal-blue);">${initials(r.name)}</div>
        <div>
          <div class="nm">${r.name}</div>
          <div class="st">${graded ? '✓ Graded' : 'Not graded yet'}</div>
        </div>
      </div>`;
  }).join('') || '<div class="empty-note">No matching students.</div>';
}
function jumpToStudent(sn){
  const subResult = gradingSubmissionsCache[gradingWeek];
  const studentNumbers = subResult.roster.map(r=>r.studentNumber);
  gradingIdx = studentNumbers.indexOf(sn);
  closeStudentSearch();
  renderGrading();
}

  const weeksHtml = classData.schedule.slice().sort((a,b)=>b.Week-a.Week).map(s=>{
    const w = s.Week;
    const toLocal = v => v ? new Date(v).toISOString().slice(0,16) : '';
    return `
      <div class="card">
        <div class="sub-title" style="font-size:1.05rem;">Week ${String(w).padStart(2,'0')}</div>
        <label class="field-label">Date range label</label>
        <input type="text" value="${s.DateRangeLabel||''}" onchange="saveScheduleField(${w},'dateRangeLabel',this.value)">
        <label class="field-label" style="margin-top:10px;">Prompt</label>
        <input type="text" value="${s.Prompt||''}" onchange="saveScheduleField(${w},'prompt',this.value)">
        <div class="week-edit-grid" style="margin-top:12px;">
          <div><label class="field-label">Post opens</label><input type="datetime-local" value="${toLocal(s.PostOpen)}" onchange="saveScheduleField(${w},'postOpen',this.value)"></div>
          <div><label class="field-label">Post closes</label><input type="datetime-local" value="${toLocal(s.PostClose)}" onchange="saveScheduleField(${w},'postClose',this.value)"></div>
          <div><label class="field-label">Picture deadline</label><input type="datetime-local" value="${toLocal(s.PictureDeadline)}" onchange="saveScheduleField(${w},'pictureDeadline',this.value)"></div>
          <div><label class="field-label">Comment deadline</label><input type="datetime-local" value="${toLocal(s.CommentDeadline)}" onchange="saveScheduleField(${w},'commentDeadline',this.value)"></div>
          <div><label class="field-label">Reply deadline</label><input type="datetime-local" value="${toLocal(s.ReplyDeadline)}" onchange="saveScheduleField(${w},'replyDeadline',this.value)"></div>
        </div>
      </div>`;
  }).join('');
  document.getElementById('content').innerHTML = `
    <div class="section-label">Weekly deadlines — ${currentClass}</div>
    ${weeksHtml || '<div class="card empty-note">No weeks yet.</div>'}
    <div class="card">
      <label class="field-label">Add a new week</label>
      <input type="number" id="newWeekNum" placeholder="Week number" style="margin-bottom:8px;">
      <button class="btn btn-ghost" onclick="addNewWeek()">+ Add week</button>
    </div>
  `;
}

async function saveScheduleField(week, field, value){
  const s = classData.schedule.find(s=>s.Week===week);
  const payload = {
    classId: currentClass, week,
    dateRangeLabel: s.DateRangeLabel, prompt: s.Prompt,
    postOpen: s.PostOpen, postClose: s.PostClose,
    pictureDeadline: s.PictureDeadline, commentDeadline: s.CommentDeadline, replyDeadline: s.ReplyDeadline,
  };
  payload[field] = value;
  // keep local copy roughly in sync (field names differ in case between client/sheet — map back)
  const fieldMap = {dateRangeLabel:'DateRangeLabel', prompt:'Prompt', postOpen:'PostOpen', postClose:'PostClose',
    pictureDeadline:'PictureDeadline', commentDeadline:'CommentDeadline', replyDeadline:'ReplyDeadline'};
  s[fieldMap[field]] = value;

  showLoading('Saving…');
  const result = await callApi('saveSchedule', payload);
  hideLoading();
  if(result.success) showToast('Saved.');
  else showToast(result.error || "Couldn't save.");
}

async function addNewWeek(){
  const w = parseInt(document.getElementById('newWeekNum').value);
  if(!w){ showToast('Enter a week number first.'); return; }
  if(classData.schedule.find(s=>s.Week===w)){ showToast('That week already exists.'); return; }
  showLoading('Adding week…');
  const result = await callApi('saveSchedule', {
    classId: currentClass, week: w, dateRangeLabel: '', prompt: '',
    postOpen: '', postClose: '', pictureDeadline: '', commentDeadline: '', replyDeadline: '',
  });
  hideLoading();
  if(result.success){
    classData.schedule.push({Week:w, DateRangeLabel:'', Prompt:'', PostOpen:'', PostClose:'', PictureDeadline:'', CommentDeadline:'', ReplyDeadline:''});
    renderSchedule();
  } else showToast(result.error || "Couldn't add week.");
}

/* ====================== ROSTER & GROUPS TAB ====================== */
function renderRoster(){
  const rosterRows = classData.roster.map(m=>`
    <tr>
      <td>${m.StudentNumber}</td>
      <td>${m.Name}</td>
      <td><label class="switch"><input type="checkbox" ${m.Active?'checked':''} onchange="toggleRosterActive('${m.StudentNumber}', this.checked)"><span class="slider"></span></label></td>
    </tr>`).join('');

  const weekOptions = classData.schedule.map(s=>`<option value="${s.Week}">Week ${String(s.Week).padStart(2,'0')}</option>`).join('');
  const latestWeek = classData.groups.length ? Math.max(...classData.groups.map(g=>Number(g.Week))) : null;
  const currentGroupRows = latestWeek!==null ? classData.groups.filter(g=>Number(g.Week)===latestWeek) : [];
  const groupIds = [...new Set(currentGroupRows.map(g=>g.GroupID))];
  const groupsHtml = groupIds.map(gid=>{
    const members = currentGroupRows.filter(g=>g.GroupID===gid).map(g=>{
      const r = classData.roster.find(r=>String(r.StudentNumber)===String(g.StudentNumber));
      return r ? r.Name : g.StudentNumber;
    });
    return `<div style="margin-bottom:8px;"><span class="group-pill">Group ${gid}</span>
      ${members.map(n=>`<span class="group-pill" style="background:#fff;border:1px solid var(--border);color:var(--ink);">${n}</span>`).join('')}</div>`;
  }).join('');

  const activeCount = classData.roster.filter(r=>r.Active).length;
  const defaultGroups = Math.max(1, Math.round(activeCount/3)); // aims for ~3 per group by default

  document.getElementById('content').innerHTML = `
    <div class="section-label">Roster — ${currentClass}</div>
    <div class="card">
      <table class="roster-table">
        <thead><tr><th>Student #</th><th>Name</th><th>Active</th></tr></thead>
        <tbody>${rosterRows || '<tr><td colspan="3" class="empty-note">No students yet — add rows to the Roster tab in the spreadsheet.</td></tr>'}</tbody>
      </table>
    </div>

    <div class="section-label">Groups</div>
    <div class="card">
      <div class="week-edit-grid" style="margin-bottom:14px;">
        <div><label class="field-label">Number of groups</label><input type="number" id="numGroupsInput" value="${defaultGroups}" min="1" max="${activeCount||1}"></div>
        <div><label class="field-label">Generate for</label><select id="groupWeekSelect">${weekOptions}</select></div>
      </div>
      <div style="font-size:0.78rem;color:var(--ink-soft);margin-bottom:12px;">${activeCount} active student${activeCount===1?'':'s'} — leftover students get spread across the first groups (e.g. 12 students / 5 groups → two groups of 3, three of 2).</div>
      <button class="btn btn-primary" onclick="doGenerateGroups()">🎲 Generate fresh groups</button>
      <div class="sub-subhead" style="margin-top:18px;">Current groups ${latestWeek!==null?`(Week ${String(latestWeek).padStart(2,'0')})`:''}</div>
      ${groupsHtml || '<div class="empty-note">No groups yet.</div>'}
    </div>
  `;
}

async function toggleRosterActive(sn, active){
  showLoading('Saving…');
  const result = await callApi('updateRosterActive', { classId: currentClass, studentNumber: sn, active });
  hideLoading();
  if(result.success){
    const r = classData.roster.find(r=>String(r.StudentNumber)===String(sn));
    if(r) r.Active = active;
    showToast('Saved.');
  } else {
    showToast(result.error || "Couldn't save.");
    renderRoster(); // revert the checkbox visually
  }
}

async function doGenerateGroups(){
  const week = parseInt(document.getElementById('groupWeekSelect').value);
  const numberOfGroups = parseInt(document.getElementById('numGroupsInput').value) || 1;
  showLoading('Generating groups…');
  const result = await callApi('generateGroups', { classId: currentClass, week, numberOfGroups });
  hideLoading();
  if(result.success){
    showToast(`Created ${result.groupCount} group(s) for ${result.studentCount} students.`);
    classData = await callApi('getClassData', { classId: currentClass });
    renderRoster();
  } else {
    showToast(result.error || "Couldn't generate groups.");
  }
}

/* ====================== RUBRIC TAB ====================== */
let rubricEditorVersionIdx = null;

function renderRubricTab(){
  if(rubricEditorVersionIdx===null) rubricEditorVersionIdx = classData.rubricVersions.length - 1;
  const sorted = classData.rubricVersions;

  const pillsHtml = sorted.map((v,i)=>{
    const next = sorted[i+1];
    const range = next ? `Weeks ${v.startWeek}–${next.startWeek-1}` : `Week ${v.startWeek}+ (current)`;
    return `<button class="version-pill ${i===rubricEditorVersionIdx?'active':''}" onclick="rubricEditorVersionIdx=${i}; renderRubricTab();">
      Version ${i+1} <span class="vrange">· ${range}</span>
    </button>`;
  }).join('');

  if(!sorted.length){
    document.getElementById('content').innerHTML = `<div class="card empty-note">No rubric versions yet.</div>`;
    return;
  }
  const version = sorted[rubricEditorVersionIdx];
  const totalPts = version.criteria.reduce((s,cr)=>s+cr.maxPoints,0);

  const criteriaHtml = version.criteria.map((crit, ci)=>{
    const tiersHtml = crit.tiers.map((t,ti)=>`
      <div class="editor-tier-row">
        <input type="text" value="${t.label}" placeholder="Tier label" onchange="updateTier(${ci},${ti},'label',this.value)">
        <input type="text" value="${t.desc}" placeholder="Description (optional)" onchange="updateTier(${ci},${ti},'desc',this.value)">
        <input type="number" value="${t.points}" placeholder="Pts" onchange="updateTier(${ci},${ti},'points',parseInt(this.value)||0)">
        <div style="display:flex;gap:4px;">
          <button class="icon-btn" style="color:var(--ink-soft);" ${ti===0?'disabled':''} onclick="moveTier(${ci},${ti},-1)" title="Move up">↑</button>
          <button class="icon-btn" style="color:var(--ink-soft);" ${ti===crit.tiers.length-1?'disabled':''} onclick="moveTier(${ci},${ti},1)" title="Move down">↓</button>
          <button class="icon-btn" onclick="removeTier(${ci},${ti})" title="Remove tier">✕</button>
        </div>
      </div>`).join('');
    return `
      <div class="editor-criterion">
        <div class="editor-criterion-head">
          <div><label class="field-label">Criterion name</label><input type="text" value="${crit.name}" onchange="updateCriterion(${ci},'name',this.value)"></div>
          <div><label class="field-label">Max points</label><input type="number" value="${crit.maxPoints}" disabled title="Computed from tier points"></div>
          <div><label class="field-label">Auto-grade by</label>
            <select onchange="updateCriterion(${ci},'autoType',this.value)">
              ${['Manual','WordCount','PictureTimeliness','CommentCompletion','ReplyCompletion'].map(t=>`<option value="${t}" ${crit.autoType===t?'selected':''}>${t}</option>`).join('')}
            </select>
          </div>
          <button class="icon-btn" onclick="removeCriterion(${ci})" title="Remove criterion">✕</button>
        </div>
        <label class="field-label">Tiers</label>
        ${tiersHtml}
        <button class="btn btn-ghost btn-sm" onclick="addTier(${ci})">+ Add tier</button>
      </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="section-label">Rubric versions — ${currentClass}</div>
    <p style="font-size:0.86rem;color:var(--ink-soft);margin:0 0 14px;">
      Editing a version changes grading for every week mapped to it — including past weeks. To change the rubric
      <strong>going forward only</strong>, use "Save as new version" below instead.
    </p>
    <div>${pillsHtml}</div>
    <div class="card" style="margin-top:14px;">
      <div class="total-pts-note">Total: ${totalPts} points across ${version.criteria.length} criteria</div>
      ${criteriaHtml}
      <button class="btn btn-ghost" onclick="addCriterion()">+ Add criterion</button>
      <div class="editor-actions">
        <button class="btn btn-primary" onclick="saveCurrentRubricVersion()">Save changes to this version</button>
      </div>
      <div class="new-version-row">
        <div>
          <label class="field-label">Start a new version from week</label>
          <input type="number" id="newVersionWeek" min="1" placeholder="e.g. 9">
        </div>
        <button class="btn btn-ghost" onclick="saveAsNewVersion()">Save as new version →</button>
      </div>
    </div>
  `;
}

function updateCriterion(ci, field, value){
  const crit = classData.rubricVersions[rubricEditorVersionIdx].criteria[ci];
  crit[field] = value;
  if(field==='name') renderRubricTab();
}
function removeCriterion(ci){
  const crit = classData.rubricVersions[rubricEditorVersionIdx].criteria[ci];
  showConfirmModal(
    `Remove "${crit.name}" completely from this rubric version? This can't be undone, and it affects every week using this version.`,
    ()=>{
      classData.rubricVersions[rubricEditorVersionIdx].criteria.splice(ci,1);
      showToast(`"${crit.name}" removed — click "Save changes to this version" to make it permanent.`);
      renderRubricTab();
    }
  );
}
function addCriterion(){
  classData.rubricVersions[rubricEditorVersionIdx].criteria.push({
    id:'crit'+Date.now(), name:'New Criterion', order:99, autoType:'Manual', maxPoints:10,
    tiers:[{label:'No submission', desc:'', points:0}, {label:'Good', desc:'', points:10}]
  });
  renderRubricTab();
}
function updateTier(ci, ti, field, value){
  const crit = classData.rubricVersions[rubricEditorVersionIdx].criteria[ci];
  crit.tiers[ti][field] = value;
  if(field==='points') crit.maxPoints = Math.max(...crit.tiers.map(t=>t.points));
}
function removeTier(ci, ti){
  const crit = classData.rubricVersions[rubricEditorVersionIdx].criteria[ci];
  crit.tiers.splice(ti,1);
  crit.maxPoints = crit.tiers.length ? Math.max(...crit.tiers.map(t=>t.points)) : 0;
  renderRubricTab();
}
function moveTier(ci, ti, dir){
  const tiers = classData.rubricVersions[rubricEditorVersionIdx].criteria[ci].tiers;
  const newIdx = ti + dir;
  if(newIdx < 0 || newIdx >= tiers.length) return;
  [tiers[ti], tiers[newIdx]] = [tiers[newIdx], tiers[ti]];
  renderRubricTab();
}
function addTier(ci){
  const crit = classData.rubricVersions[rubricEditorVersionIdx].criteria[ci];
  crit.tiers.push({label:'New tier', desc:'', points:0});
  renderRubricTab();
}

async function saveCurrentRubricVersion(){
  const version = classData.rubricVersions[rubricEditorVersionIdx];
  showLoading('Saving rubric…');
  const result = await callApi('saveRubricVersion', { classId: currentClass, versionId: version.versionId, criteria: version.criteria });
  hideLoading();
  if(result.success) showToast('Rubric saved.');
  else showToast(result.error || "Couldn't save rubric.");
}

async function saveAsNewVersion(){
  const wk = parseInt(document.getElementById('newVersionWeek').value);
  if(!wk || wk<1){ showToast('Enter a valid starting week first.'); return; }
  const currentVersion = classData.rubricVersions[rubricEditorVersionIdx];
  const cloned = JSON.parse(JSON.stringify(currentVersion.criteria));
  showLoading('Creating new version…');
  const result = await callApi('createRubricVersion', { classId: currentClass, startWeek: wk, criteria: cloned });
  hideLoading();
  if(result.success){
    classData.rubricVersions.push({ versionId: result.versionId, startWeek: wk, criteria: cloned });
    classData.rubricVersions.sort((a,b)=>a.startWeek-b.startWeek);
    rubricEditorVersionIdx = classData.rubricVersions.findIndex(v=>v.versionId===result.versionId);
    showToast(`New rubric version created, effective Week ${wk} onward.`);
    renderRubricTab();
  } else {
    showToast(result.error || "Couldn't create new version.");
  }
}

/* ====================== SETTINGS TAB ====================== */
function renderSettings(){
  const s = classData.settings;
  document.getElementById('content').innerHTML = `
    <div class="section-label">Feature toggles — ${currentClass}</div>
    <div class="card">
      <div class="toggle-row">
        <div><div class="tname">Groups</div><div class="tdesc">Randomize students into weekly groups for commenting. Turn off if students discuss on an external forum instead.</div></div>
        <label class="switch"><input type="checkbox" ${s.GroupsEnabled?'checked':''} onchange="saveSettingsField('groupsEnabled',this.checked)"><span class="slider"></span></label>
      </div>
      <div class="toggle-row">
        <div><div class="tname">Comments</div><div class="tdesc">Allow students to comment on groupmates' posts within this site.</div></div>
        <label class="switch"><input type="checkbox" ${s.CommentsEnabled?'checked':''} onchange="saveSettingsField('commentsEnabled',this.checked)"><span class="slider"></span></label>
      </div>
      <div class="toggle-row">
        <div><div class="tname">Replies</div><div class="tdesc">Allow students to reply to comments they receive.</div></div>
        <label class="switch"><input type="checkbox" ${s.RepliesEnabled?'checked':''} onchange="saveSettingsField('repliesEnabled',this.checked)"><span class="slider"></span></label>
      </div>
      <div class="toggle-row">
        <div><div class="tname">Picture / video</div><div class="tdesc">Allow photo uploads and YouTube links on posts.</div></div>
        <label class="switch"><input type="checkbox" ${s.PictureEnabled?'checked':''} onchange="saveSettingsField('pictureEnabled',this.checked)"><span class="slider"></span></label>
      </div>
    </div>

    <div class="section-label">Account</div>
    <div class="card">
      <label class="field-label">Teacher accounts</label>
      <div style="font-size:0.88rem;color:var(--ink-soft);padding:8px 0;">
        Managed directly in your Teacher Credentials Google Sheet (username + password per teacher) — not shown here, since passwords should never be visible in the page itself.
      </div>
      <label class="field-label" style="margin-top:12px;">Drive folder for uploaded images</label>
      <input type="text" value="${s.DriveImageFolderID||''}" disabled>
    </div>
  `;
}

async function saveSettingsField(field, value){
  classData.settings[field.charAt(0).toUpperCase()+field.slice(1)] = value; // rough local mirror
  showLoading('Saving…');
  const result = await callApi('saveSettings', {
    classId: currentClass,
    groupSize: classData.settings.GroupSize,
    groupsEnabled: field==='groupsEnabled' ? value : classData.settings.GroupsEnabled,
    commentsEnabled: field==='commentsEnabled' ? value : classData.settings.CommentsEnabled,
    repliesEnabled: field==='repliesEnabled' ? value : classData.settings.RepliesEnabled,
    pictureEnabled: field==='pictureEnabled' ? value : classData.settings.PictureEnabled,
  });
  hideLoading();
  if(result.success) showToast('Saved.');
  else showToast(result.error || "Couldn't save.");
}
</script>
