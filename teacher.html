<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Forum — Teacher (Live)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFF1EA; --card:#FFFFFF; --ink:#20261F; --ink-soft:#5B6358;
    --stamp-red:#B23A2E; --postal-blue:#3D5A73; --gold:#C9A227; --border:#D7DACE;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;-webkit-font-smoothing:antialiased;}
  .app{width:100%;max-width:1500px;margin:0 auto;padding:0 16px 60px;}
  @media (min-width:1100px){ .app{width:92%;} }

  header.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 4px 14px;border-bottom:1px solid var(--border);margin-bottom:18px;gap:12px;flex-wrap:wrap;}
  .brand{font-family:'Fraunces',serif;font-weight:600;font-size:1.3rem;}
  .brand small{display:block;font-family:'IBM Plex Mono',monospace;font-size:0.6rem;color:var(--ink-soft);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;}
  .who-row{display:flex;align-items:center;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:0.78rem;color:var(--ink-soft);}
  .class-pill{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;background:#EEF1EC;color:var(--postal-blue);padding:4px 10px;border-radius:12px;}
  .switch-class-btn{font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:0.82rem;color:#fff;background:var(--stamp-red);border:none;border-radius:9px;padding:8px 14px;cursor:pointer;}
  .switch-class-btn:hover{opacity:0.92;}

  .nav{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap;}
  .nav button{font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:0.86rem;padding:9px 16px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--ink-soft);cursor:pointer;}
  .nav button.active{background:var(--ink);color:#fff;border-color:var(--ink);}

  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;}
  .section-label{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.07em;margin:18px 4px 8px;}

  input[type=text], input[type=number], input[type=password], input[type=datetime-local], textarea, select{
    width:100%;font-family:'IBM Plex Sans',sans-serif;font-size:0.92rem;padding:9px 11px;
    border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--ink);
  }
  textarea{resize:vertical;}
  label.field-label{display:block;font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:5px;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:9px;padding:10px 16px;font-weight:600;font-size:0.88rem;cursor:pointer;}
  .btn-primary{background:var(--stamp-red);color:#fff;}
  .btn-primary:hover{opacity:0.92;}
  .btn-ghost{background:transparent;color:var(--postal-blue);border:1px solid var(--border);}
  .btn-block{width:100%;}
  .btn-sm{padding:6px 11px;font-size:0.78rem;}

  /* Login */
  .login-screen{min-height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:18px;}
  .login-screen .brand{font-size:2rem;}
  .login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;width:100%;max-width:340px;}
  .error-msg{color:var(--stamp-red);font-size:0.82rem;margin-top:8px;display:none;}

  /* Class select */
  .class-select-screen{min-height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:8px;padding:20px;}
  .class-select-screen h2{font-family:'Fraunces',serif;font-weight:600;font-size:1.7rem;margin:0;}
  .class-select-screen p{color:var(--ink-soft);font-size:0.92rem;margin:0 0 20px;}
  .class-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;max-width:520px;}
  .class-card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    width:160px;height:110px;display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;font-weight:600;font-size:1.2rem;color:var(--postal-blue);
    cursor:pointer;transition:transform .1s ease, box-shadow .15s ease;
  }
  .class-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(32,38,31,0.1);}

  /* Grading layout */
  .grading-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .grading-toolbar select{max-width:260px;}
  .grading-layout{display:grid;grid-template-columns:1fr;gap:18px;align-items:start;}
  @media (min-width:760px){
    .grading-layout{grid-template-columns:1.2fr 1fr;}
    .grading-layout > div{height:calc(100vh - 200px);min-height:480px;overflow-y:auto;}
  }

  .submission-card{}
  .sub-title{font-family:'Fraunces',serif;font-weight:600;font-size:1.25rem;margin-bottom:8px;}
  .sub-meta{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--postal-blue);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:600;font-size:0.92rem;flex-shrink:0;}
  .sub-meta .nm{font-weight:600;font-size:0.92rem;}
  .sub-meta .wc{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:var(--ink-soft);}
  .sub-body{line-height:1.65;font-size:0.96rem;white-space:pre-wrap;margin-bottom:10px;}
  .sub-media img{width:100%;border-radius:10px;margin-bottom:10px;}
  .sub-subhead{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.06em;margin:18px 0 8px;border-top:1px solid var(--border);padding-top:14px;}
  .sub-comment{display:flex;gap:9px;margin-bottom:10px;}
  .sub-comment .avatar{width:26px;height:26px;font-size:0.7rem;}
  .sub-comment-body{flex:1;background:#F7F8F4;border-radius:9px;padding:8px 11px;}
  .sub-comment-body .cn{font-weight:600;font-size:0.8rem;}
  .sub-comment-body .ct{font-size:0.84rem;margin-top:1px;line-height:1.45;}
  .sub-comment-body .cwc{font-family:'IBM Plex Mono',monospace;font-size:0.66rem;color:var(--ink-soft);margin-top:4px;}
  .sub-reply{margin-top:7px;padding-top:7px;border-top:1px solid var(--border);}
  .reply-label{font-size:0.68rem;font-weight:600;color:var(--ink-soft);margin-bottom:2px;letter-spacing:0.02em;}
  .no-reply-yet{color:#b03030 !important;}
  .ts{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--ink-soft);font-weight:400;margin-left:4px;}
  .empty-note{color:var(--ink-soft);font-size:0.84rem;font-style:italic;}

  .grade-sidebar{position:relative;}
  .progress-bar{display:flex;align-items:center;justify-content:space-between;background:#F7F8F4;border-radius:10px;padding:10px 14px;margin-bottom:14px;}
  .progress-bar .ptext{font-family:'IBM Plex Mono',monospace;font-size:0.78rem;color:var(--ink-soft);}
  .progress-bar .ptotal{font-weight:600;color:var(--ink);}
  .student-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .student-nav .id{display:flex;align-items:center;gap:10px;}
  .student-nav .id .nm{font-weight:600;font-size:1.02rem;}
  .nav-arrow{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:1rem;color:var(--ink-soft);}
  .nav-arrow:hover{background:#F7F8F4;}

  .feedback-box label.field-label{margin-top:0;}
  .feedback-box textarea{min-height:80px;margin-bottom:16px;}

  .criterion{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
  .criterion-head{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;cursor:pointer;background:#FAFBF8;}
  .criterion-head .cname{font-weight:600;font-size:0.9rem;}
  .criterion-head .cpts{font-family:'IBM Plex Mono',monospace;font-size:0.74rem;color:var(--ink-soft);}
  .criterion-head .ctoggle{font-size:0.85rem;color:var(--ink-soft);}
  .criterion-body{padding:6px 14px 12px;display:none;}
  .criterion.open .criterion-body{display:block;}
  .criterion.open .criterion-head{background:#fff;border-bottom:1px solid var(--border);}
  .tier-option{display:flex;gap:10px;align-items:flex-start;padding:8px 6px;border-radius:8px;cursor:pointer;}
  .tier-option:hover{background:#F7F8F4;}
  .tier-option input{margin-top:3px;}
  .tier-option .tlabel{font-weight:600;font-size:0.85rem;}
  .tier-option .tdesc{font-size:0.78rem;color:var(--ink-soft);margin-top:2px;line-height:1.4;}
  .tier-option .tpts{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:var(--gold);margin-top:3px;display:inline-block;}
  .tier-option.auto-suggested{background:#FBF6E2;}
  .auto-tag{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;color:var(--gold);text-transform:uppercase;letter-spacing:0.04em;margin-left:6px;}

  .grade-actions{display:flex;gap:10px;margin-top:16px;}

  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 4px;border-bottom:1px solid var(--border);}
  .toggle-row:last-child{border-bottom:none;}
  .toggle-row .tname{font-weight:600;font-size:0.92rem;}
  .toggle-row .tdesc{font-size:0.8rem;color:var(--ink-soft);margin-top:2px;}
  .switch{position:relative;width:46px;height:26px;flex-shrink:0;}
  .switch input{opacity:0;width:0;height:0;}
  .switch .slider{position:absolute;inset:0;background:var(--border);border-radius:26px;cursor:pointer;transition:background .15s;}
  .switch .slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .15s;}
  .switch input:checked + .slider{background:var(--postal-blue);}
  .switch input:checked + .slider::before{transform:translateX(20px);}

  table.roster-table{width:100%;border-collapse:collapse;font-size:0.88rem;}
  table.roster-table th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.05em;padding:8px 10px;border-bottom:1px solid var(--border);}
  table.roster-table td{padding:10px;border-bottom:1px solid var(--border);}
  table.roster-table tr:last-child td{border-bottom:none;}

  .group-pill{display:inline-block;background:#EEF1EC;color:var(--postal-blue);font-family:'IBM Plex Mono',monospace;font-size:0.72rem;padding:3px 9px;border-radius:12px;margin:2px;}

  .week-edit-grid{display:grid;grid-template-columns:1fr;gap:12px;}
  @media (min-width:700px){ .week-edit-grid{grid-template-columns:1fr 1fr;} }

  /* Rubric editor */
  .version-pill{display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:0.78rem;padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:#fff;cursor:pointer;margin:0 8px 8px 0;}
  .version-pill.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .version-pill .vrange{opacity:0.7;}
  .editor-criterion{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;background:#FAFBF8;}
  .editor-criterion-head{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:10px;}
  .editor-tier-row{display:grid;grid-template-columns:1.2fr 2fr 0.7fr auto;gap:8px;align-items:end;margin-bottom:8px;}
  @media (max-width:700px){ .editor-criterion-head, .editor-tier-row{grid-template-columns:1fr;} }
  .icon-btn{background:none;border:1px solid var(--border);border-radius:8px;width:34px;height:34px;cursor:pointer;color:var(--stamp-red);flex-shrink:0;}
  .icon-btn:hover{background:#FBEAE7;}
  .icon-btn:disabled{opacity:0.3;cursor:not-allowed;}
  .icon-btn:disabled:hover{background:none;}
  .editor-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
  .new-version-row{display:flex;gap:10px;align-items:end;margin-top:18px;border-top:1px solid var(--border);padding-top:16px;}
  .new-version-row > div{flex:1;}
  .total-pts-note{font-family:'IBM Plex Mono',monospace;font-size:0.76rem;color:var(--ink-soft);margin-top:10px;}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(32,38,31,0.55);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:60px 20px;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:var(--card);border-radius:16px;padding:20px;max-width:420px;width:100%;box-shadow:0 14px 44px rgba(32,38,31,0.3);max-height:80vh;display:flex;flex-direction:column;}
  .student-search-list{margin:14px 0;overflow-y:auto;flex:1;min-height:60px;}
  .search-result-row{display:flex;align-items:center;gap:12px;padding:10px 8px;border-radius:9px;cursor:pointer;}
  .search-result-row:hover{background:#F7F8F4;}
  .search-result-row .nm{font-weight:600;font-size:0.92rem;}
  .search-result-row .st{font-size:0.78rem;color:var(--ink-soft);margin-top:1px;}
  .search-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:0.95rem;}
  .search-btn:hover{background:#F7F8F4;}

  .hidden{display:none !important;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;font-size:0.85rem;opacity:0;pointer-events:none;transition:all .25s ease;max-width:90%;text-align:center;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .mock-banner{font-family:'IBM Plex Mono',monospace;font-size:0.76rem;color:var(--gold);background:#FBF6E2;border:1px solid rgba(201,162,39,0.35);border-radius:10px;padding:10px 14px;margin-bottom:16px;}
  .version-tag{font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--ink-soft);opacity:0.7;margin-top:6px;}
  .loading-overlay{position:fixed;inset:0;background:rgba(239,241,234,0.88);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:200;}
  .loading-overlay.show{display:flex;}
  .spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--stamp-red);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-overlay .ltext{font-family:'IBM Plex Mono',monospace;font-size:0.85rem;color:var(--ink-soft);}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="ltext" id="loadingText">Loading…</div>
</div>

<div class="modal-overlay" id="studentSearchModal">
  <div class="modal-box">
    <input type="text" id="studentSearchInput" placeholder="Search students..." oninput="filterStudentSearch()">
    <div id="studentSearchList" class="student-search-list"></div>
    <button class="btn btn-ghost btn-block" onclick="closeStudentSearch()">Close</button>
  </div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal-box" style="text-align:center;">
    <div class="modal-icon" style="font-size:2.2rem;margin-bottom:6px;">⚠️</div>
    <p id="confirmModalText" style="font-size:0.92rem;color:var(--ink-soft);line-height:1.5;margin:0 0 18px;"></p>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeConfirmModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1;" id="confirmModalOkBtn">Remove</button>
    </div>
  </div>
</div>

<div class="app">

  <div class="login-screen" id="loginScreen">
    <div class="brand">Weekly Forum<small>TEACHER CONSOLE</small></div>
    <div class="login-card">
      <label class="field-label">Username</label>
      <input type="text" id="userInput" placeholder="your real username" autocomplete="off">
      <label class="field-label" style="margin-top:12px;">Password</label>
      <input type="password" id="pwInput" placeholder="••••••••">
      <button class="btn btn-primary btn-block" style="margin-top:14px;" onclick="login()">Enter</button>
      <div class="error-msg" id="loginError">Incorrect username or password.</div>
    </div>
    <div class="version-tag">live-v1.6 — 2026-07-21</div>
  </div>

  <div class="class-select-screen hidden" id="classSelectScreen">
    <h2>Select a class</h2>
    <p>Which class would you like to manage?</p>
    <div class="class-grid" id="classGrid"></div>
  </div>

  <div id="mainApp" class="hidden">
    <header class="topbar">
      <div class="brand">Weekly Forum<small>TEACHER CONSOLE</small></div>
      <div class="who-row">
        <span id="whoName">—</span>
        <span class="class-pill" id="classPill">—</span>
        <button class="switch-class-btn" onclick="showClassSelect()">🏫 Switch Class</button>
      </div>
    </header>

    <div class="nav">
      <button class="nav-btn active" data-tab="grading" onclick="switchTab('grading')">Grading</button>
      <button class="nav-btn" data-tab="schedule" onclick="switchTab('schedule')">Schedule &amp; Deadlines</button>
      <button class="nav-btn" data-tab="roster" onclick="switchTab('roster')">Roster &amp; Groups</button>
      <button class="nav-btn" data-tab="rubric" onclick="switchTab('rubric')">Rubric</button>
      <button class="nav-btn" data-tab="settings" onclick="switchTab('settings')">Settings</button>
      <button class="nav-btn" data-tab="reflections" onclick="switchTab('reflections')">Reflections</button>
      <button class="nav-btn" data-tab="grammar" onclick="switchTab('grammar')">Grammar Analysis</button>
    </div>

    <div id="content"></div>
  </div>
</div>

<script>
/* ====================================================================
   LIVE TEACHER BACKEND WIRING
   Replaces the mock CLASSES object with real calls to your Apps Script API.
   ==================================================================== */

const API_URL = "https://script.google.com/macros/s/AKfycbyMbuD6_z3PTOt8P_dS8TPTImZB-r1cnraENT82KGxD6eL2EGK0IxSC5spUu38SfFnX/exec";

async function callApi(action, payload){
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(Object.assign({ action }, payload || {})),
  });
  return res.json();
}

let currentTeacher = null;
let currentClass = null;
let classData = null;     // result of getClassData — roster/settings/schedule/groups/rubricVersions
let realClassNames = [];
let toastTimer;

function initials(name){ return (name||'?').split(' ').map(n=>n[0]).join(''); }
function wordCount(text){ return (text||'').trim().split(/\s+/).filter(Boolean).length; }
function formatTs(ts){
  if(!ts) return '';
  const d = new Date(ts);
  if(isNaN(d.getTime())) return '';
  return d.toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 2400);
}
function showLoading(text){
  document.getElementById('loadingText').textContent = text || 'Loading…';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading(){
  document.getElementById('loadingOverlay').classList.remove('show');
}

/* ====================== AUTH ====================== */
async function login(){
  const user = document.getElementById('userInput').value.trim();
  const pw = document.getElementById('pwInput').value;
  document.getElementById('loginError').style.display = 'none';
  showLoading('Logging in…');
  const result = await callApi('teacherLogin', { username: user, password: pw });
  hideLoading();
  if(result.success){
    currentTeacher = { displayName: result.displayName };
    document.getElementById('loginScreen').classList.add('hidden');
    await showClassSelect();
  } else {
    document.getElementById('loginError').textContent = result.error || 'Incorrect username or password.';
    document.getElementById('loginError').style.display = 'block';
  }
}

async function showClassSelect(){
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('classSelectScreen').classList.remove('hidden');
  document.getElementById('classGrid').innerHTML = `<div class="empty-note">Loading classes…</div>`;
  const result = await callApi('getClassesList');
  if(!result.success){
    document.getElementById('classGrid').innerHTML = `<div class="empty-note">${result.error}</div>`;
    return;
  }
  realClassNames = result.classes;
  document.getElementById('classGrid').innerHTML = realClassNames.map(name=>
    `<div class="class-card" onclick="enterClass('${name}')">${name}</div>`).join('');
}

async function enterClass(name){
  currentClass = name;
  showLoading('Loading class data…');
  classData = await callApi('getClassData', { classId: name });
  hideLoading();
  if(!classData.success){
    showToast(classData.error || "Couldn't load that class.");
    return;
  }
  document.getElementById('classSelectScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('whoName').textContent = currentTeacher.displayName;
  document.getElementById('classPill').textContent = name;
  gradingWeek = null;
  gradingIdx = 0;
  switchTab('grading');
}

function cls(){ return classData; }

/* ====================== NAV ====================== */

/* ====================== RUBRIC VERSION LOOKUP ====================== */
function getRubricVersionForWeek(week){
  const versions = classData.rubricVersions;
  if(!versions.length) return { versionId:null, startWeek:0, criteria:[] };
  let best = versions[0];
  versions.forEach(v=>{ if(v.startWeek<=Number(week) && v.startWeek>=best.startWeek) best=v; });
  return best;
}

function getGroupmateCount(studentNumber, week){
  const rows = classData.groups.filter(g=>String(g.Week)===String(week));
  const mine = rows.find(g=>String(g.StudentNumber)===String(studentNumber));
  if(!mine) return 0;
  return rows.filter(g=>g.GroupID===mine.GroupID).length - 1;
}

function commentsQualify(commentsArr, deadline){
  if(!deadline) return commentsArr.every(c=>wordCount(c.text)>=30);
  return commentsArr.every(c=> wordCount(c.text)>=30 && new Date(c.createdAt) <= new Date(deadline));
}

function autoSelectTier(crit, sub, sn, week, schedule){
  if(crit.autoType==='WordCount'){
    const wc = wordCount(sub.text);
    if(wc === 0) return 0;
    // Use the autoMin values from the actual rubric tiers — iterate from highest down
    // and return the first tier whose minimum word threshold the student meets.
    for(let i = crit.tiers.length - 1; i >= 0; i--){
      const min = (crit.tiers[i].autoMin !== '' && crit.tiers[i].autoMin !== undefined)
        ? Number(crit.tiers[i].autoMin) : 0;
      if(wc >= min) return i;
    }
    return 0;
  }
  if(crit.autoType==='PictureTimeliness') return sub.image ? 1 : 0;
  if(crit.autoType==='CommentCompletion'){
    // Use groupmatesWithPosts (groupmates who actually submitted) rather than total
    // group size — a student shouldn't be penalised for not commenting on a post
    // that doesn't exist.
    const required = sub.groupmatesWithPosts !== undefined
      ? sub.groupmatesWithPosts
      : getGroupmateCount(sn, week);
    if(required <= 0) return null;
    const ok = sub.commentsMade.length >= required && commentsQualify(sub.commentsMade, schedule && schedule.CommentDeadline);
    return ok ? 1 : 0;
  }
  if(crit.autoType==='ReplyCompletion'){
    const received = sub.commentsReceived;
    // If no comments were received, check whether anyone could have commented.
    // If groupmatesWithPosts is 0, nobody could have commented — treat as N/A.
    if(received.length === 0){
      const couldHaveReceived = sub.groupmatesWithPosts !== undefined
        ? sub.groupmatesWithPosts > 0
        : getGroupmateCount(sn, week) > 0;
      return couldHaveReceived ? 0 : null;
    }
    const allReplied = received.every(c=>c.reply);
    if(!allReplied) return 0;
    const ok = received.every(c=> wordCount(c.reply.text)>=30 && (!schedule || !schedule.ReplyDeadline || new Date(c.reply.createdAt) <= new Date(schedule.ReplyDeadline)));
    return ok ? 1 : 0;
  }
  return null;
}

/* ====================== GRADING ====================== */
let gradingWeek = null;
let gradingIdx = 0;
let gradingSubmissionsCache = {}; // week -> {roster, submissions}
let gradingSelections = {};       // studentNumber -> {criterionId: tierIndex}
let gradingAutoSelections = {};   // studentNumber -> {criterionId: tierIndex} (for WasOverridden tracking)
let gradingFeedbackDraft = {};    // studentNumber -> text (local draft before save)
let gradingSavedSet = {};         // studentNumber -> true once saved this session
let currentGradingRubric = null;  // rubric array for the current student, used by updateGradeTotalDisplay
let currentGradingSn = null;      // student number currently being graded

function updateGradeTotalDisplay(){
  const el = document.getElementById('gradeTotalDisplay');
  if(!el || !currentGradingRubric || !currentGradingSn) return;
  const sel  = gradingSelections[currentGradingSn] || {};
  const auto = gradingAutoSelections[currentGradingSn] || {};
  let total=0, max=0, allSelected=true;
  currentGradingRubric.forEach(crit=>{
    const tierIdx = sel[crit.id] !== undefined ? sel[crit.id] : auto[crit.id];
    const critMax = crit.tiers.length ? Math.max(...crit.tiers.map(t=>Number(t.points)||0)) : 0;
    max += critMax;
    if(tierIdx !== undefined && tierIdx !== null && crit.tiers[tierIdx]){
      total += Number(crit.tiers[tierIdx].points) || 0;
    } else {
      allSelected = false;
    }
  });
  el.textContent = `${total} / ${max} pts`;
  el.style.color = allSelected ? 'var(--postal-blue)' : 'var(--ink-soft)';
}

async function loadSubmissionsForWeek(week){
  if(gradingSubmissionsCache[week]) return gradingSubmissionsCache[week];
  // Fresh load for this week — clear per-student state so saved grades come from the backend
  gradingSelections = {};
  gradingAutoSelections = {};
  gradingFeedbackDraft = {};
  gradingSavedSet = {};
  currentGradingRubric = null;
  currentGradingSn = null;
  const result = await callApi('getSubmissionsForGrading', { classId: currentClass, week });
  if(result.success) gradingSubmissionsCache[week] = result;
  return result;
}

function downloadMoodleReport(){
  const subResult = gradingSubmissionsCache[gradingWeek];
  if(!subResult){ showToast('Load the grading tab for this week first.'); return; }
  const rubric = getRubricVersionForWeek(gradingWeek).criteria;

  const lines = subResult.roster.map(r=>{
    const sn = r.studentNumber;
    const sub = subResult.submissions[sn]||{};
    // Prefer grades saved to the sheet; fall back to current session selections
    const saved = sub.savedGrades||{};
    const session = gradingSelections[sn]||{};

    let total=0, max=0;
    const criterionLines = rubric.map(crit=>{
      const critMax = crit.tiers.length ? Math.max(...crit.tiers.map(t=>Number(t.points)||0)) : 0;
      max += critMax;
      const tierIdx = saved[crit.id]!==undefined ? saved[crit.id]
                    : session[crit.id]!==undefined ? session[crit.id]
                    : null;
      if(tierIdx===null||tierIdx===undefined||!crit.tiers[tierIdx]){
        return `${crit.name}: <span style='color:gray'>Not graded</span>`;
      }
      const pts = Number(crit.tiers[tierIdx].points)||0;
      total += pts;
      const color = pts>0 ? 'green' : 'red';
      return `${crit.name}: <span style='color:${color}'>${crit.tiers[tierIdx].label} = ${pts} points</span>`;
    }).join('<br>');

    const totalColor = total>=60 ? 'green' : 'red';
    const html = `<p><b>Student:</b> ${r.name} (${sn})<br><b>Assignment Breakdown:</b><br>${criterionLines}<br><b>Total: </b><span style='color:${totalColor}'>${total} / ${max} points</span></p>`;
    return `${total}\t${html}`;
  }).join('\n');

  const blob = new Blob([lines],{type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`${currentClass}_Week${String(gradingWeek).padStart(2,'0')}_Moodle_Grades.txt`;
  a.click(); URL.revokeObjectURL(url);
  showToast('Moodle report downloaded.');
}

function getSelections(sn, rubric, sub, week, schedule){
  if(!gradingSelections[sn]){
    const sel = {};
    if(sub.savedGrades && Object.keys(sub.savedGrades).length > 0){
      // Restore previously saved grades — these take priority over auto-suggestions
      rubric.forEach(crit=>{
        if(sub.savedGrades[crit.id] !== undefined) sel[crit.id] = sub.savedGrades[crit.id];
      });
      gradingSavedSet[sn] = true; // mark as already graded so the counter shows correctly
    } else {
      // No saved grades yet — seed from auto-grading
      rubric.forEach(crit=>{
        const auto = autoSelectTier(crit, sub, sn, week, schedule);
        if(auto !== null) sel[crit.id] = auto;
      });
    }
    gradingSelections[sn] = sel;
    gradingAutoSelections[sn] = Object.assign({}, sel);
    // Restore saved feedback draft if present and not already locally edited
    if(sub.savedFeedback && !gradingFeedbackDraft[sn]){
      gradingFeedbackDraft[sn] = sub.savedFeedback;
    }
  }
  return gradingSelections[sn];
}

async function renderGrading(){
  const weekOptions = classData.schedule.sort((a,b)=>b.Week-a.Week)
    .map(s=>`<option value="${s.Week}">Week ${String(s.Week).padStart(2,'0')}</option>`).join('');
  if(gradingWeek===null && classData.schedule.length) gradingWeek = classData.schedule[0].Week;
  if(!classData.schedule.length){
    document.getElementById('content').innerHTML = `<div class="card empty-note">No weeks set up in Schedule yet — add one in the Schedule tab first.</div>`;
    return;
  }

  document.getElementById('content').innerHTML = `<div class="card empty-note">Loading submissions…</div>`;
  const subResult = await loadSubmissionsForWeek(gradingWeek);
  if(!subResult.success){
    document.getElementById('content').innerHTML = `<div class="card empty-note">${subResult.error}</div>`;
    return;
  }

  const studentNumbers = subResult.roster.map(r=>r.studentNumber);
  if(studentNumbers.length===0){
    document.getElementById('content').innerHTML = `<div class="card empty-note">No active students in this class yet.</div>`;
    return;
  }
  gradingIdx = ((gradingIdx % studentNumbers.length) + studentNumbers.length) % studentNumbers.length;
  const sn = studentNumbers[gradingIdx];
  const author = subResult.roster.find(r=>r.studentNumber===sn);
  const sub = subResult.submissions[sn];
  const schedule = classData.schedule.find(s=>String(s.Week)===String(gradingWeek));
  const rubricVersion = getRubricVersionForWeek(gradingWeek);
  const rubric = rubricVersion.criteria;
  const sel = getSelections(sn, rubric, sub, gradingWeek, schedule);
  const gradedCount = studentNumbers.filter(s=>gradingSavedSet[s]).length;
  currentGradingRubric = rubric;
  currentGradingSn = sn;

  let bodyHtml;
  if(!sub.title){
    bodyHtml = `<div class="card"><div class="empty-note">No submission from this student for this week.</div></div>`;
  } else {
    const wc = wordCount(sub.text);
    const postTs = sub.postCreatedAt ? `<span class="ts">${formatTs(sub.postCreatedAt)}</span>` : '';
    const mediaHtml = sub.image
      ? `<div class="sub-media"><img src="${sub.image}">${sub.imageCreatedAt ? `<div class="ts" style="text-align:center;margin-top:4px;font-size:0.72rem;">${formatTs(sub.imageCreatedAt)}</div>` : ''}</div>`
      : '';

    const groupMembersHtml = sub.groupMembers && sub.groupMembers.length
      ? `<div class="sub-subhead">Group members</div>
         <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;">
           ${sub.groupMembers.map(n=>`<span style="background:var(--paper-2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:0.78rem;">${n}</span>`).join('')}
         </div>`
      : '';

    const receivedHtml = sub.commentsReceived.length
      ? sub.commentsReceived.map(c=>{
          const cAuthor = subResult.roster.find(r=>r.studentNumber===String(c.from));
          const cwc = wordCount(c.text);
          const replyHtml = c.reply
            ? `<div class="sub-reply">
                 <div class="reply-label">↩ Their reply</div>
                 <div class="ct">${c.reply.text}</div>
                 <div class="cwc">${wordCount(c.reply.text)} words · ${formatTs(c.reply.createdAt)}</div>
               </div>`
            : `<div class="cwc no-reply-yet">No reply yet</div>`;
          return `
            <div class="sub-comment">
              <div class="avatar" style="background:var(--postal-blue)">${initials(cAuthor?cAuthor.name:c.from)}</div>
              <div class="sub-comment-body">
                <div class="cn">${cAuthor?cAuthor.name:c.from} <span class="ts">${formatTs(c.createdAt)}</span></div>
                <div class="ct">${c.text}</div>
                <div class="cwc">${cwc} words</div>
                ${replyHtml}
              </div>
            </div>`;
        }).join('')
      : `<div class="empty-note">No comments received.</div>`;

    const madeHtml = sub.commentsMade.length
      ? sub.commentsMade.map(c=>{
          const cwc = wordCount(c.text);
          const replyHtml = c.reply
            ? `<div class="sub-reply">
                 <div class="reply-label">↩ Groupmate's reply</div>
                 <div class="ct">${c.reply.text}</div>
                 <div class="cwc">${wordCount(c.reply.text)} words · ${formatTs(c.reply.createdAt)}</div>
               </div>`
            : '';
          return `
            <div class="sub-comment">
              <div class="avatar" style="background:var(--border);color:var(--ink-soft);">→</div>
              <div class="sub-comment-body">
                <div class="cn">On: "${c.toPost}" <span class="ts">${formatTs(c.createdAt)}</span></div>
                <div class="ct">${c.text}</div>
                <div class="cwc">${cwc} words</div>
                ${replyHtml}
              </div>
            </div>`;
        }).join('')
      : `<div class="empty-note">No comments made on groupmates.</div>`;

    bodyHtml = `
      <div class="card submission-card">
        <div class="sub-title">${sub.title}</div>
        <div class="sub-meta">
          <div class="avatar" style="background:var(--postal-blue)">${initials(author.name)}</div>
          <div><div class="nm">${author.name}</div><div class="wc">${wc} words ${postTs}</div></div>
        </div>
        <div class="sub-body">${sub.text}</div>
        ${mediaHtml}
        ${groupMembersHtml}
        <div class="sub-subhead">Comments received (on their post)</div>
        ${receivedHtml}
        <div class="sub-subhead">Comments made (on groupmates' posts)</div>
        ${madeHtml}
      </div>`;
  }

  const criteriaHtml = rubric.map(crit=>{
    const selIdx = sel[crit.id];
    const tiersHtml = crit.tiers.map((t,i)=>{
      const checked = i===selIdx ? 'checked' : '';
      const autoTag = (i===selIdx && crit.autoType!=='Manual') ? '<span class="auto-tag">Auto-suggested</span>' : '';
      return `
        <label class="tier-option ${i===selIdx && crit.autoType!=='Manual' ? 'auto-suggested' : ''}">
          <input type="radio" name="${crit.id}-${sn}" value="${i}" ${checked} onchange="selectTier('${sn}','${crit.id}',${i})">
          <div>
            <div class="tlabel">${t.label}${autoTag}</div>
            ${t.desc ? `<div class="tdesc">${t.desc}</div>` : ''}
            <div class="tpts">${t.points} pts</div>
          </div>
        </label>`;
    }).join('');
    return `
      <div class="criterion open" id="crit-${crit.id}">
        <div class="criterion-head" onclick="toggleCriterion('${crit.id}')">
          <div><div class="cname">${crit.num||''} ${crit.name}</div></div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="cpts">${crit.maxPoints} pts max</span>
            <span class="ctoggle">▾</span>
          </div>
        </div>
        <div class="criterion-body">${tiersHtml}</div>
      </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="grading-toolbar">
      <select onchange="gradingWeek=parseInt(this.value); gradingIdx=0; gradingSelections={}; renderGrading();">${weekOptions}</select>
      <div class="progress-bar" style="flex:1;max-width:240px;">
        <span class="ptext">Graded</span>
        <span class="ptext ptotal">${gradedCount} / ${studentNumbers.length}</span>
      </div>
      <button class="btn btn-ghost" style="font-size:0.8rem;padding:6px 14px;" onclick="downloadMoodleReport()" title="Download grade list for Moodle">⬇ Moodle Report</button>
      <button class="search-btn" onclick="openStudentSearch()" title="Search students">🔍</button>
    </div>
    <div class="total-pts-note" style="margin:-8px 0 14px;">Using rubric version starting Week ${rubricVersion.startWeek} (Rubric tab to manage versions)</div>
    <div class="grading-layout">
      <div>${bodyHtml}</div>
      <div class="grade-sidebar card">
        <div class="student-nav">
          <button class="nav-arrow" onclick="navStudent(-1)">‹</button>
          <div class="id">
            <div class="avatar" style="background:var(--postal-blue)">${initials(author.name)}</div>
            <div class="nm">${author.name}</div>
          </div>
          <button class="nav-arrow" onclick="navStudent(1)">›</button>
        </div>
        <div style="text-align:center;padding:8px 0 4px;">
          <span id="gradeTotalDisplay" style="font-family:'IBM Plex Mono',monospace;font-size:1.1rem;font-weight:600;color:var(--ink-soft);"></span>
        </div>
        ${criteriaHtml}
        <div class="feedback-box">
          <label class="field-label">Overall feedback (shown to student)</label>
          <textarea id="feedbackInput" placeholder="Write some overall advice...">${gradingFeedbackDraft[sn] || ''}</textarea>
        </div>
        <div class="grade-actions">
          <button class="btn btn-ghost" style="flex:1;" onclick="saveGrade(false)">Save</button>
          <button class="btn btn-primary" style="flex:1;" onclick="saveGrade(true)">Save &amp; Next →</button>
        </div>
      </div>
    </div>
  `;
  updateGradeTotalDisplay();
}

function toggleCriterion(critId){ document.getElementById('crit-'+critId).classList.toggle('open'); }
function selectTier(sn, critId, idx){
  if(!gradingSelections[sn]) gradingSelections[sn] = {};
  gradingSelections[sn][critId] = idx;
  updateGradeTotalDisplay();
}
function navStudent(dir){
  gradingIdx += dir;
  renderGrading();
}

async function saveGrade(andNext){
  const subResult = gradingSubmissionsCache[gradingWeek];
  const studentNumbers = subResult.roster.map(r=>r.studentNumber);
  const sn = studentNumbers[((gradingIdx % studentNumbers.length)+studentNumbers.length)%studentNumbers.length];
  gradingFeedbackDraft[sn] = document.getElementById('feedbackInput').value;

  const rubricVersion = getRubricVersionForWeek(gradingWeek);
  const sel = gradingSelections[sn] || {};
  const auto = gradingAutoSelections[sn] || {};
  const grades = rubricVersion.criteria
    .filter(crit => sel[crit.id] !== undefined)
    .map(crit => ({
      criterionId: crit.id,
      tierOrder: sel[crit.id],
      wasOverridden: auto[crit.id] !== undefined && auto[crit.id] !== sel[crit.id],
    }));

  showLoading('Saving grade…');
  const result = await callApi('saveGrade', {
    classId: currentClass, studentNumber: sn, week: gradingWeek,
    grades, overallFeedback: gradingFeedbackDraft[sn], gradedBy: currentTeacher.displayName,
  });
  hideLoading();

  if(result.success){
    gradingSavedSet[sn] = true;
    showToast(`Saved grade for ${author_name_lookup(sn)}.`);
    if(andNext) navStudent(1); else renderGrading();
  } else {
    showToast(result.error || "Couldn't save grade.");
  }
}
function author_name_lookup(sn){
  const r = gradingSubmissionsCache[gradingWeek].roster.find(r=>r.studentNumber===sn);
  return r ? r.name : sn;
}

function renderSchedule(){
  const weeksHtml = classData.schedule.slice().sort((a,b)=>b.Week-a.Week).map(s=>{
    const w = s.Week;
    // Previously this did new Date(v).toISOString().slice(0,16) — toISOString() always
    // returns UTC, so a teacher in JST (UTC+9) would see every deadline shifted 9 hours
    // earlier than what's actually saved. datetime-local inputs want a wall-clock string
    // with no timezone info, so we build it from the local getters instead.
    const toLocal = v => {
      if(!v) return '';
      const dt = new Date(v);
      if(isNaN(dt.getTime())) return '';
      const pad = n => String(n).padStart(2,'0');
      return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}T${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
    };
    return `
      <div class="card">
        <div class="sub-title" style="font-size:1.05rem;">Week ${String(w).padStart(2,'0')}</div>
        <label class="field-label">Date range label</label>
        <input type="text" value="${s.DateRangeLabel||''}" onchange="saveScheduleField(${w},'dateRangeLabel',this.value)">
        <label class="field-label" style="margin-top:10px;">Prompt</label>
        <input type="text" value="${s.Prompt||''}" onchange="saveScheduleField(${w},'prompt',this.value)">
        <div class="week-edit-grid" style="margin-top:12px;">
          <div><label class="field-label">Post opens</label><input type="datetime-local" value="${toLocal(s.PostOpen)}" onchange="saveScheduleField(${w},'postOpen',this.value)"></div>
          <div><label class="field-label">Post closes</label><input type="datetime-local" value="${toLocal(s.PostClose)}" onchange="saveScheduleField(${w},'postClose',this.value)"></div>
          <div><label class="field-label">Picture deadline</label><input type="datetime-local" value="${toLocal(s.PictureDeadline)}" onchange="saveScheduleField(${w},'pictureDeadline',this.value)"></div>
          <div><label class="field-label">Comment deadline</label><input type="datetime-local" value="${toLocal(s.CommentDeadline)}" onchange="saveScheduleField(${w},'commentDeadline',this.value)"></div>
          <div><label class="field-label">Reply deadline</label><input type="datetime-local" value="${toLocal(s.ReplyDeadline)}" onchange="saveScheduleField(${w},'replyDeadline',this.value)"></div>
        </div>
      </div>`;
  }).join('');
  document.getElementById('content').innerHTML = `
    <div class="section-label">Weekly deadlines — ${currentClass}</div>
    ${weeksHtml || '<div class="card empty-note">No weeks yet.</div>'}
    <div class="card">
      <label class="field-label">Add a new week</label>
      <input type="number" id="newWeekNum" placeholder="Week number" style="margin-bottom:8px;">
      <button class="btn btn-ghost" onclick="addNewWeek()">+ Add week</button>
    </div>
  `;
}

async function saveScheduleField(week, field, value){
  const s = classData.schedule.find(s=>s.Week===week);
  const payload = {
    classId: currentClass, week,
    dateRangeLabel: s.DateRangeLabel, prompt: s.Prompt,
    postOpen: s.PostOpen, postClose: s.PostClose,
    pictureDeadline: s.PictureDeadline, commentDeadline: s.CommentDeadline, replyDeadline: s.ReplyDeadline,
  };
  payload[field] = value;
  // keep local copy roughly in sync (field names differ in case between client/sheet — map back)
  const fieldMap = {dateRangeLabel:'DateRangeLabel', prompt:'Prompt', postOpen:'PostOpen', postClose:'PostClose',
    pictureDeadline:'PictureDeadline', commentDeadline:'CommentDeadline', replyDeadline:'ReplyDeadline'};
  s[fieldMap[field]] = value;

async function addNewWeek(){
  const w = parseInt(document.getElementById('newWeekNum').value);
  if(!w){ showToast('Enter a week number first.'); return; }
  if(classData.schedule.find(s=>s.Week===w)){ showToast('That week already exists.'); return; }

  // Auto-fill deadlines from the nearest existing week, shifted by however many weeks apart
  // they are — this keeps the same day-of-week and time-of-day, which covers the normal case
  // (adding the very next week) as well as adding a week a bit further out or earlier.
  const priorWeeks = classData.schedule.filter(s=>s.Week < w).sort((a,b)=>b.Week-a.Week);
  const reference = priorWeeks[0] || classData.schedule.slice().sort((a,b)=>b.Week-a.Week)[0];
  const weeksApart = reference ? (w - reference.Week) : 0;

  const shiftDate = d => {
    if(!d) return '';
    const dt = new Date(d);
    if(isNaN(dt.getTime())) return '';
    dt.setDate(dt.getDate() + weeksApart*7);
    return dt.toISOString();
  };

  const formatRangeDate = d => {
    if(!d) return '';
    const dt = new Date(d);
    if(isNaN(dt.getTime())) return '';
    return dt.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
  };

  const postOpen = reference ? shiftDate(reference.PostOpen) : '';
  const postClose = reference ? shiftDate(reference.PostClose) : '';
  const pictureDeadline = reference ? shiftDate(reference.PictureDeadline) : '';
  const commentDeadline = reference ? shiftDate(reference.CommentDeadline) : '';
  const replyDeadline = reference ? shiftDate(reference.ReplyDeadline) : '';

  // Cosmetic only — blog-open date through reply-close date, e.g. "Jun 8 – Jun 14".
  const dateRangeLabel = (postOpen && replyDeadline) ? `${formatRangeDate(postOpen)} – ${formatRangeDate(replyDeadline)}` : '';
  const prompt = '';

  showLoading('Adding week…');
  const result = await callApi('saveSchedule', {
    classId: currentClass, week: w, dateRangeLabel, prompt,
    postOpen, postClose, pictureDeadline, commentDeadline, replyDeadline,
  });
  hideLoading();
  if(result.success){
    classData.schedule.push({Week:w, DateRangeLabel:dateRangeLabel, Prompt:prompt, PostOpen:postOpen, PostClose:postClose, PictureDeadline:pictureDeadline, CommentDeadline:commentDeadline, ReplyDeadline:replyDeadline});
    renderSchedule();
    if(reference){
      showToast(`Week added — deadlines copied from Week ${String(reference.Week).padStart(2,'0')} (shifted ${weeksApart} week${Math.abs(weeksApart)===1?'':'s'}). Double-check, then edit any field if needed.`);
    } else {
      showToast('Week added.');
    }
  } else showToast(result.error || "Couldn't add week.");
}

function updateCriterion(ci, field, value){
  const crit = classData.rubricVersions[rubricEditorVersionIdx].criteria[ci];
  crit[field] = value;
  if(field==='name') renderRubricTab();
}
function removeCriterion(ci){
  const crit = classData.rubricVersions[rubricEditorVersionIdx].criteria[ci];
  showConfirmModal(
    `Remove "${crit.name}" completely from this rubric version? This can't be undone, and it affects every week using this version.`,
    ()=>{
      classData.rubricVersions[rubricEditorVersionIdx].criteria.splice(ci,1);
      showToast(`"${crit.name}" removed — click "Save changes to this version" to make it permanent.`);
      renderRubricTab();
    }
  );
}
function addCriterion(){
  classData.rubricVersions[rubricEditorVersionIdx].criteria.push({
    id:'crit'+Date.now(), name:'New Criterion', order:99, autoType:'Manual', maxPoints:10,
    tiers:[{label:'No submission', desc:'', points:0}, {label:'Good', desc:'', points:10}]
  });
  renderRubricTab();
}
function updateTier(ci, ti, field, value){
  const crit = classData.rubricVersions[rubricEditorVersionIdx].criteria[ci];
  crit.tiers[ti][field] = value;
  if(field==='points') crit.maxPoints = Math.max(...crit.tiers.map(t=>t.points));
}
function removeTier(ci, ti){
  const crit = classData.rubricVersions[rubricEditorVersionIdx].criteria[ci];
  crit.tiers.splice(ti,1);
  crit.maxPoints = crit.tiers.length ? Math.max(...crit.tiers.map(t=>t.points)) : 0;
  renderRubricTab();
}
function moveTier(ci, ti, dir){
  const tiers = classData.rubricVersions[rubricEditorVersionIdx].criteria[ci].tiers;
  const newIdx = ti + dir;
  if(newIdx < 0 || newIdx >= tiers.length) return;
  [tiers[ti], tiers[newIdx]] = [tiers[newIdx], tiers[ti]];
  renderRubricTab();
}
function addTier(ci){
  const crit = classData.rubricVersions[rubricEditorVersionIdx].criteria[ci];
  crit.tiers.push({label:'New tier', desc:'', points:0});
  renderRubricTab();
}

const CCF_M = 12, CCF_W = 210 - CCF_M*2;

// ── Colour/recurrence engine STUB ───────────────────────────────────────
// The real engine (StudiedSet + per-semester recurrence counts, CCF §4) is
// not built yet, so every treatable error defaults to green (Decision #4:
// no study history recorded = "not yet studied," never higher). Purple is
// real, not a stub (SC/PU never carry a unit or history — that's a fact
// about the code). Grey is also real: COL/WC/IDM/AWK (untreatable errors)
// are never colour-coded to a unit and never selectable as a study unit,
// but they're never silently dropped either — a class-wide toggle for
// whether grey actually renders to students doesn't exist yet (would need
// a new Settings field); for now grey always renders.
const CCF_COLORS = {
  green:  {fill:[219,242,229], text:[26,58,42]},
  yellow: {fill:[253,244,205], text:[102,79,8]},
  orange: {fill:[253,225,196], text:[120,58,10]},
  red:    {fill:[252,220,220], text:[110,28,28]},
  purple: {fill:[230,222,247], text:[74,42,128]},
  grey:   {fill:[230,230,228], text:[90,90,86]},
};
function ccfUnitState(code){
  if(!code) return null;
  if(code==='SC'||code==='PU') return 'purple';
  if(code==='COL'||code==='WC'||code==='IDM'||code==='AWK') return 'grey';
  return 'green'; // STUB — see comment above
}
function ccfTagFor(style){
  const noUnit = style.state==='purple' || style.state==='grey';
  return noUnit ? style.code : style.code + (style.primaryUnit ? '\u00b7'+style.primaryUnit : '');
}

// ── Tokenize the CCF tag format into word-level tokens ──────────────────
// Tag shapes: {span|CODE|UNIT}, {span|CODE|UNIT1/UNIT2} (dual-unit,
// slash-separated), {^|CODE|UNIT} (omission, caret only — never the
// missing word), {span|CODE} (no unit — SC/PU/COL/WC/IDM/AWK).
function ccfTokenize(text){
  const re=/\{(\^|[^{}|]*)\|([A-Z]+)(?:\|([BI]\d+(?:\/[BI]\d+)?))?\}/g;
  const tokens=[]; let last=0, m;
  function pushWords(str, style){
    // Splits on blank-line paragraph breaks into {break:true} markers, then
    // on whitespace into individual word tokens — no separate space
    // tokens; spacing between words is handled uniformly at render time.
    String(str).split(/\n\s*\n/).forEach((para, i, arr)=>{
      para.split(/\s+/).filter(Boolean).forEach(w=> tokens.push({text:w, style}));
      if(i < arr.length-1) tokens.push({break:true});
    });
  }
  while((m=re.exec(text))!==null){
    pushWords(text.slice(last, m.index), null);
    const span=m[1], code=m[2].trim();
    const unitRaw=m[3]?m[3].trim():'';
    const [primaryUnit, secondaryUnit] = unitRaw ? unitRaw.split('/') : [null,null];
    const state=ccfUnitState(code);
    const noUnit = state==='purple' || state==='grey';
    const style = state ? {code, primaryUnit: noUnit?null:primaryUnit, secondaryUnit: noUnit?null:secondaryUnit, state, border:false} : null;
    if(span==='^'){
      tokens.push({text:'^', style});
    } else {
      span.trim().split(/\s+/).filter(Boolean).forEach(w=> tokens.push({text:w, style}));
    }
    last = m.index+m[0].length;
  }
  pushWords(text.slice(last), null);
  return tokens;
}

// ── Word-wrap that treats each styled word + its inline [CODE·UNIT] tag
// as one atomic unit (so a tag never gets orphaned onto the next line) ──
function ccfLayoutAnnotated(doc, tokens, fontSize, maxWidth){
  const tagFontSize = fontSize*0.62;
  doc.setFont('helvetica','normal'); doc.setFontSize(fontSize);
  const spaceW = doc.getTextWidth(' ');
  const widths = tokens.map(t=>{
    if(t.break) return 0;
    doc.setFont('helvetica', t.style?'bold':'normal'); doc.setFontSize(fontSize);
    let w = doc.getTextWidth(t.text);
    if(t.style){
      doc.setFont('helvetica','normal'); doc.setFontSize(tagFontSize);
      w += doc.getTextWidth(' ['+ccfTagFor(t.style)+']');
    }
    return w;
  });
  doc.setFont('helvetica','normal'); doc.setFontSize(fontSize); // leave doc state clean for the next caller
  const lines=[]; let cur=[]; let curW=0;
  tokens.forEach((t,i)=>{
    if(t.break){ if(cur.length){lines.push(cur); cur=[]; curW=0;} lines.push([]); return; }
    const w=widths[i];
    const add = cur.length? spaceW+w : w;
    if(curW+add>maxWidth && cur.length){ lines.push(cur); cur=[]; curW=0; }
    cur.push(t); curW += (cur.length>1?spaceW:0)+w;
  });
  if(cur.length) lines.push(cur);
  return lines;
}
function ccfDrawAnnotated(doc, tokens, x0, y0, fontSize, lineHeight, maxWidth){
  const lines = ccfLayoutAnnotated(doc, tokens, fontSize, maxWidth);
  doc.setFont('helvetica','normal'); doc.setFontSize(fontSize);
  const spaceW = doc.getTextWidth(' ');
  const tagFontSize = fontSize*0.62;
  let y=y0;
  lines.forEach(line=>{
    let x=x0;
    line.forEach(t=>{
      doc.setFont('helvetica', t.style?'bold':'normal'); doc.setFontSize(fontSize);
      let w = doc.getTextWidth(t.text);
      let tagStr = null, tagW=0;
      if(t.style){
        tagStr = ' ['+ccfTagFor(t.style)+']';
        doc.setFont('helvetica','normal'); doc.setFontSize(tagFontSize);
        tagW = doc.getTextWidth(tagStr);
      }
      if(t.style){
        const c = CCF_COLORS[t.style.state];
        doc.setFillColor(...c.fill);
        doc.roundedRect(x-0.6, y-fontSize*0.34, w+tagW+1.2, fontSize*0.48, 0.5, 0.5, 'F');
        doc.setTextColor(...c.text);
      } else {
        doc.setTextColor(40,40,40);
      }
      doc.setFont('helvetica', t.style?'bold':'normal'); doc.setFontSize(fontSize);
      doc.text(t.text, x, y);
      x += w;
      if(tagStr){
        doc.setFont('helvetica','normal'); doc.setFontSize(tagFontSize);
        doc.text(tagStr, x, y);
        x += tagW;
      }
      x += spaceW;
    });
    y += lineHeight;
  });
  return y;
}

// ── Layout helpers (all take `doc` explicitly, so a scratch doc can be
// used to MEASURE the fixed-height section below without drawing on the
// real page — see ccfDrawPostBlogSection) ──────────────────────────────
function ccfRuled(doc, y, n, gap){
  for(let i=0;i<n;i++){ doc.setDrawColor(61,90,115); doc.setLineWidth(0.35); doc.line(CCF_M,y,210-CCF_M,y); y+=gap; }
  return y;
}
function ccfFieldLabel(doc, y, text){
  doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.setTextColor(91,99,88);
  doc.text(text.toUpperCase(), CCF_M+4, y);
  return y + 4.2;
}
function ccfFieldLabelTag(doc, y, text, fill, textColor){
  const lbl = text.toUpperCase();
  doc.setFontSize(7.5); doc.setFont('helvetica','bold');
  const tw = doc.getTextWidth(lbl);
  doc.setFillColor(...fill);
  doc.roundedRect(CCF_M+2.5, y-3.6, tw+7, 5.2, 1, 1, 'F');
  doc.setTextColor(...textColor);
  doc.text(lbl, CCF_M+6, y);
  return y + 5.2;
}
function ccfBoxAround(doc, yStart, yEnd){
  doc.setDrawColor(91,99,88); doc.setLineWidth(0.45);
  doc.roundedRect(CCF_M, yStart, CCF_W, yEnd-yStart, 2, 2, 'S');
}
function ccfSentenceBox(doc, y, labelText, fill, textColor){
  const boxStart = y;
  y += 3;
  y = fill
    ? ccfFieldLabelTag(doc, y, labelText, fill, textColor) + 3.5
    : ccfFieldLabel(doc, y, labelText) + 3.5;
  y = ccfRuled(doc, y, 2, 6.5) + 2.5;
  y = ccfFieldLabel(doc, y, 'Correction attempt') + 3.5;
  y = ccfRuled(doc, y, 2, 6.5) + 2.5;
  y = ccfFieldLabel(doc, y, 'AI check / original sentence (homework)') + 3.5;
  y = ccfRuled(doc, y, 2, 6.5) + 1.5;
  ccfBoxAround(doc, boxStart, y);
  return y;
}

// Everything from the divider through Sentence 2's box — same function used
// both to MEASURE (on a disposable scratch doc, so we know exactly how much
// room to leave for the blog entry) and to actually DRAW (on the real doc).
// Because it's the same code path, the measurement can never drift out of
// sync with the real layout, even as spacing keeps changing.
function ccfDrawPostBlogSection(doc, yStart, newUnit){
  let y = yStart;
  y += 5;
  doc.setDrawColor(215,218,206); doc.line(CCF_M,y,210-CCF_M,y); y += 7;

  doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.setTextColor(91,99,88);
  const newUnitLabel = 'NEW UNIT';
  doc.text(newUnitLabel, CCF_M+4, y);
  const labelW = doc.getTextWidth(newUnitLabel);
  doc.setDrawColor(42,122,78); doc.setLineWidth(0.4);
  doc.roundedRect(CCF_M+4+labelW+4, y-4.2, 20, 6.5, 1, 1, 'S');

  // Teacher check — same row as New Unit, top right. Two boxes, same size
  // as the New Unit box, each with its label outside/left of it.
  const tcW = 20, tcH = 6.5, tcGap = 8;
  const checks = ['In-class completion', 'Homework completion'];
  let cursorRight = CCF_M + CCF_W - 4;
  const placed = [];
  for(let i = checks.length - 1; i >= 0; i--){
    doc.setFontSize(7.5); doc.setFont('helvetica','bold');
    const labelText = checks[i].toUpperCase();
    const labelWidth = doc.getTextWidth(labelText);
    const boxRight = cursorRight;
    const boxLeft = boxRight - tcW;
    const labelEndX = boxLeft - 3;
    placed[i] = { labelText, labelEndX, boxLeft };
    cursorRight = labelEndX - labelWidth - tcGap;
  }
  placed.forEach(p => {
    doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.setTextColor(91,99,88);
    doc.text(p.labelText, p.labelEndX, y, {align:'right'});
    doc.setDrawColor(61,90,115); doc.setLineWidth(0.4);
    doc.roundedRect(p.boxLeft, y-4.2, tcW, tcH, 1, 1, 'S');
  });

  y += 10;

  y = ccfSentenceBox(doc, y, 'Sentence 1 — new unit', [219,242,229], [26,58,42]); y += 4;
  y = ccfSentenceBox(doc, y, 'Sentence 2 — recurring', [253,244,205], [102,79,8]);
  return y;
}

// ── Builds one student's CCF reflection page in a jsPDF doc (bulk/multi-page use) ──
function addCCFReflectionPage(doc, studentName, classId, studentNumber, week, annotation, isFirst){
  if(!isFirst) doc.addPage();

  const hasAnnotation = annotation && annotation.annotatedText;
  const blogTitle = (annotation && annotation.title) ? annotation.title : `Week ${week} entry`;

  doc.setFontSize(14); doc.setFont('helvetica','bold'); doc.setTextColor(32,38,31);
  doc.text('Blog Entry Grammar Reflection', CCF_M, 12);
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(91,99,88);
  doc.text(`${classId}  ·  Week ${week}  ·  ${studentName}`, 210-CCF_M, 12, {align:'right'});
  doc.setDrawColor(61,90,115); doc.setLineWidth(0.8);
  doc.line(CCF_M, 16, 210-CCF_M, 16);

  let y = 24;
  doc.setFontSize(11); doc.setFont('helvetica','bold'); doc.setTextColor(32,38,31);
  doc.text(blogTitle, CCF_M, y);
  y += 6;
  doc.setDrawColor(215,218,206); doc.setLineWidth(0.25); doc.line(CCF_M,y,210-CCF_M,y); y += 6;

  const blogStartY = y;
  const scratch = new jsPDF({unit:'mm',format:'a4'});
  const AFTER_FIXED = ccfDrawPostBlogSection(scratch, 0, '');
  const MAX_Y = 292;
  const BLOG_AVAILABLE = MAX_Y - blogStartY - AFTER_FIXED;
  const FONT_MIN = 5.5, FONT_MAX = 11.5;

  let chosenFont = FONT_MIN, chosenLines = null, tokens = null;

  if(hasAnnotation){
    tokens = ccfTokenize(annotation.annotatedText);
    for(let fs=FONT_MAX; fs>=FONT_MIN; fs-=0.25){
      const testLines = ccfLayoutAnnotated(doc, tokens, fs, CCF_W-8);
      const lineH = fs*0.352778*1.42;
      if(testLines.length*lineH <= BLOG_AVAILABLE){ chosenFont=fs; chosenLines=testLines; break; }
      chosenLines=testLines;
    }
  } else {
    const plainText = 'No entry was submitted this week.';
    for(let fs=FONT_MAX; fs>=FONT_MIN; fs-=0.25){
      doc.setFontSize(fs);
      const testLines = doc.splitTextToSize(plainText, CCF_W-8);
      const lineH = fs*0.352778*1.42;
      if(testLines.length*lineH <= BLOG_AVAILABLE){ chosenFont=fs; chosenLines=testLines; break; }
      chosenLines=testLines;
    }
  }

  const lineH = chosenFont*0.352778*1.42;
  if(hasAnnotation){
    y = ccfDrawAnnotated(doc, tokens, CCF_M+4, y, chosenFont, lineH, CCF_W-8);
  } else {
    doc.setFontSize(chosenFont); doc.setFont('helvetica','italic'); doc.setTextColor(150,155,145);
    chosenLines.forEach(l => { doc.text(l, CCF_M+4, y); y += lineH; });
  }

  y = ccfDrawPostBlogSection(doc, y, '');
}

// A single hung request must never block the whole batch forever — races
// each call against a timeout so a stuck one resolves to "not found" rather
// than stalling everything behind it.
function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error('Timed out after ' + ms + 'ms')), ms)),
  ]);
}

// Fetches each roster student's annotation in small batches (not all at once)
// to avoid overloading the Apps Script deployment with a burst of simultaneous
// calls. One student's fetch failing or timing out never blocks the rest —
// it just falls back to the "no entry" state for that student's page.
// onProgress(done, total), if given, is called after each batch completes.
async function fetchAnnotationsForRoster(classId, roster, week, onProgress){
  const BATCH_SIZE = 5;
  const TIMEOUT_MS = 15000;
  const results = {};
  for(let i=0; i<roster.length; i+=BATCH_SIZE){
    const batch = roster.slice(i, i+BATCH_SIZE);
    const settled = await Promise.allSettled(
      batch.map(r => withTimeout(callApi('getAnnotationForWeek', {classId, studentNumber:r.studentNumber, week}), TIMEOUT_MS))
    );
    batch.forEach((r, idx) => {
      const res = settled[idx];
      results[r.studentNumber] = (res.status==='fulfilled' && res.value && res.value.success && res.value.found) ? res.value : null;
    });
    if(onProgress) onProgress(Math.min(i+BATCH_SIZE, roster.length), roster.length);
  }
  return results;
}

// ── Option 1: All students in one PDF ──────────────────────────────────────
async function downloadReflectionMerged(){
  if(!window.jspdf){ showToast('PDF library loading — try again in a moment.'); return; }
  const {jsPDF}=window.jspdf;
  const mergedBtn = document.getElementById('reflMergedBtn');
  const zipBtn = document.getElementById('reflZipBtn');
  const origLabel = mergedBtn.textContent;
  mergedBtn.disabled = true; zipBtn.disabled = true;

  mergedBtn.textContent = `Fetching 0/${reflectionsData.roster.length}…`;
  const annotations = await fetchAnnotationsForRoster(currentClass, reflectionsData.roster, reflectionsWeek,
    (done, total) => { mergedBtn.textContent = `Fetching ${done}/${total}…`; });

  mergedBtn.textContent = 'Building PDF…';
  const doc = new jsPDF({unit:'mm',format:'a4'});
  let first = true;
  reflectionsData.roster.forEach(r=>{
    addCCFReflectionPage(doc, r.name, currentClass, r.studentNumber, reflectionsWeek, annotations[r.studentNumber], first);
    first=false;
  });
  doc.save(`${currentClass}_Week${String(reflectionsWeek).padStart(2,'0')}_CCF-Reflections_All.pdf`);

  mergedBtn.disabled = false; zipBtn.disabled = false;
  mergedBtn.textContent = origLabel;
  showToast('Downloaded.');
}

// ── Option 2: One PDF per student, bundled as a ZIP ───────────────────────
async function downloadReflectionZip(){
  if(!window.jspdf||!window.JSZip){ showToast('Libraries loading — try again in a moment.'); return; }
  const {jsPDF}=window.jspdf;
  const zipBtn = document.getElementById('reflZipBtn');
  const mergedBtn = document.getElementById('reflMergedBtn');
  const origLabel = zipBtn.textContent;
  zipBtn.disabled = true; mergedBtn.disabled = true;

  const zip = new JSZip();
  const folder = zip.folder(`${currentClass}_Week${String(reflectionsWeek).padStart(2,'0')}_CCF-Reflections`);

  zipBtn.textContent = `Fetching 0/${reflectionsData.roster.length}…`;
  const annotations = await fetchAnnotationsForRoster(currentClass, reflectionsData.roster, reflectionsWeek,
    (done, total) => { zipBtn.textContent = `Fetching ${done}/${total}…`; });

  zipBtn.textContent = 'Building ZIP…';
  reflectionsData.roster.forEach(r=>{
    const doc = new jsPDF({unit:'mm',format:'a4'});
    addCCFReflectionPage(doc, r.name, currentClass, r.studentNumber, reflectionsWeek, annotations[r.studentNumber], true);
    const safeName = r.name.replace(/[^a-zA-Z0-9_\- ]/g,'').trim().replace(/\s+/g,'_');
    folder.file(`${safeName}_CCF-Reflection.pdf`, doc.output('arraybuffer'));
  });

  const blob = await zip.generateAsync({type:'blob'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`${currentClass}_Week${String(reflectionsWeek).padStart(2,'0')}_CCF-Reflections.zip`;
  a.click();
  URL.revokeObjectURL(url);

  zipBtn.disabled = false; mergedBtn.disabled = false;
  zipBtn.textContent = origLabel;
  showToast('ZIP downloaded.');
}

/* ════════════════════════════════════════════════════════════════════
   GRAMMAR ANALYSIS — export raw entries + Stage 1 prompt for Claude,
   import Stage 2's verified JSON back in. See CCF_handover.md and the
   Stage 1/Stage 2 prompt files for the full design.
   ════════════════════════════════════════════════════════════════════ */
let grammarWeek = null;

function renderGrammarAnalysis(){
  if(!classData.schedule.length){
    document.getElementById('content').innerHTML = `<div class="card empty-note">No weeks set up yet — add one in the Schedule tab first.</div>`;
    return;
  }
  if(grammarWeek === null) grammarWeek = classData.schedule.slice().sort((a,b)=>b.Week-a.Week)[0].Week;

  const weekOptions = classData.schedule.slice().sort((a,b)=>b.Week-a.Week)
    .map(s=>`<option value="${s.Week}" ${s.Week===grammarWeek?'selected':''}>${String(s.Week).padStart(2,'0')} · ${s.DateRangeLabel}</option>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="card" style="margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
        <div>
          <label class="field-label" style="margin-bottom:6px;">Week</label>
          <select class="week-select" id="grammarWeekSelect" onchange="grammarWeek=parseInt(this.value)">
            ${weekOptions}
          </select>
        </div>
        <div style="margin-left:auto;">
          <button class="btn btn-primary" id="grammarExportBtn" onclick="doExportGrammarFeed()">Export for Claude →</button>
        </div>
      </div>
    </div>

    <div class="section-label">Step 1 — copy this into a new Claude chat (Stage 1)</div>
    <div class="card" id="grammarExportCard">
      <div class="empty-note">Pick a week and click Export to generate the feed.</div>
    </div>

    <div class="section-label">Step 2 — copy this into a NEW Claude chat for Stage 2 verification</div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:0.82rem;color:var(--ink-soft);">Stage 2 prompt + full unit reference doc, bundled together. Paste Stage 1's JSON output where marked at the bottom before sending.</span>
        <button class="btn btn-ghost btn-sm" id="grammarStage2Btn" onclick="loadStage2Bundle()" style="flex-shrink:0;margin-left:12px;">Load bundle</button>
      </div>
      <div id="grammarStage2Container"></div>
    </div>

    <div class="section-label">Step 3 — after Stage 2, paste the final JSON here</div>
    <div class="card">
      <label class="field-label" style="margin-bottom:6px;">Verified JSON (Stage 2 output)</label>
      <textarea id="grammarImportInput" rows="8" placeholder='{"cycle": 4, "students": [...]}' style="font-family:'IBM Plex Mono',monospace;font-size:0.8rem;"></textarea>
      <button class="btn btn-primary" style="margin-top:10px;" onclick="doImportAnnotations()">Import annotations →</button>
      <div id="grammarImportResult" style="margin-top:12px;"></div>
    </div>
  `;
}

async function loadStage2Bundle(){
  const btn = document.getElementById('grammarStage2Btn');
  btn.disabled = true; btn.textContent = 'Loading…';
  const result = await callApi('getStage2Bundle', {});
  btn.disabled = false; btn.textContent = 'Load bundle';
  if(!result.success){ showToast(result.error || 'Could not load.'); return; }
  document.getElementById('grammarStage2Container').innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
      <button class="btn btn-ghost btn-sm" onclick="copyStage2Bundle()">📋 Copy to clipboard</button>
    </div>
    <textarea id="grammarStage2Text" rows="10" readonly style="font-family:'IBM Plex Mono',monospace;font-size:0.76rem;">${result.text}</textarea>
  `;
}

async function copyStage2Bundle(){
  const text = document.getElementById('grammarStage2Text').value;
  try{
    await navigator.clipboard.writeText(text);
    showToast('Copied — paste into a NEW Claude chat, add Stage 1\'s JSON where marked, then send.');
  }catch(e){
    const ta = document.getElementById('grammarStage2Text');
    ta.focus(); ta.select();
    showToast('Press Ctrl/Cmd+C to copy.');
  }
}

async function doExportGrammarFeed(){
  const btn = document.getElementById('grammarExportBtn');
  btn.disabled = true; btn.textContent = 'Exporting…';
  const result = await callApi('exportGrammarFeed', { classId: currentClass, week: grammarWeek });
  btn.disabled = false; btn.textContent = 'Export for Claude →';

  const card = document.getElementById('grammarExportCard');
  if(!result.success){
    card.innerHTML = `<div class="empty-note">${result.error}</div>`;
    return;
  }

  const warningsHtml = result.warnings && result.warnings.length
    ? `<div style="background:#FBF6E2;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:0.82rem;color:#6b5700;">
         ${result.warnings.map(w=>`⚠ ${w}`).join('<br>')}
       </div>`
    : '';

  card.innerHTML = `
    ${warningsHtml}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <span style="font-size:0.84rem;color:var(--ink-soft);">${result.entryCount} ${result.entryCount===1?'entry':'entries'} for Week ${grammarWeek}</span>
      <button class="btn btn-ghost btn-sm" onclick="copyGrammarFeed()">📋 Copy to clipboard</button>
    </div>
    <textarea id="grammarFeedText" rows="12" readonly style="font-family:'IBM Plex Mono',monospace;font-size:0.76rem;">${result.feed}</textarea>
  `;
}

async function copyGrammarFeed(){
  const text = document.getElementById('grammarFeedText').value;
  try{
    await navigator.clipboard.writeText(text);
    showToast('Copied — paste into a new Claude chat.');
  }catch(e){
    // Clipboard API can fail without a secure context/user gesture in some browsers —
    // fall back to select-all so the teacher can still Ctrl/Cmd+C manually.
    const ta = document.getElementById('grammarFeedText');
    ta.focus(); ta.select();
    showToast('Press Ctrl/Cmd+C to copy.');
  }
}

async function doImportAnnotations(){
  const raw = document.getElementById('grammarImportInput').value.trim();
  const resultDiv = document.getElementById('grammarImportResult');
  if(!raw){ showToast('Paste the verified JSON first.'); return; }

  resultDiv.innerHTML = `<div class="empty-note">Importing…</div>`;
  const result = await callApi('importAnnotations', { classId: currentClass, payload: raw });

  if(!result.success){
    resultDiv.innerHTML = `<div style="color:var(--stamp-red);font-size:0.84rem;">${result.error}</div>`;
    return;
  }

  const notFoundHtml = result.notFound && result.notFound.length
    ? `<div style="color:var(--stamp-red);font-size:0.82rem;margin-top:6px;">Not matched to a student in Roster: ${result.notFound.join(', ')}</div>`
    : '';

  resultDiv.innerHTML = `
    <div style="color:#2a7a4e;font-weight:600;font-size:0.88rem;">✓ Imported ${result.imported} ${result.imported===1?'entry':'entries'} for Week ${result.week}.</div>
    ${notFoundHtml}
  `;
}
